<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>דף הבית — שי הורביץ</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>
:root {
  --bg: #F4F5F7;
  --surface: #FFFFFF;
  --surface-2: #FAFBFC;
  --border: #E4E6EA;
  --border-strong: #CDD0D6;
  --text: #1A1B1E;
  --text-2: #5C5E63;
  --text-3: #9EA2A9;
  --accent: #2563EB;
  --accent-h: #1D4ED8;
  --accent-light: rgba(37,99,235,.08);
  --indigo: #6366F1;
  --green: #16A34A;
  --green-light: rgba(22,163,74,.1);
  --orange: #EA580C;
  --orange-light: rgba(234,88,12,.1);
  --red: #DC2626;
  --red-light: rgba(220,38,38,.1);
  --amber: #D97706;
  --amber-light: rgba(217,119,6,.1);
  --purple: #7C3AED;
  --purple-light: rgba(124,58,237,.1);
  --teal: #0D9488;
  --teal-light: rgba(13,148,136,.1);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.04);
  --shadow-lg: 0 8px 28px rgba(0,0,0,.10), 0 2px 6px rgba(0,0,0,.05);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  --transition: all .18s cubic-bezier(.4,0,.2,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); }
body { font-family: 'Heebo', system-ui, sans-serif; color: var(--text); font-size: 14px; -webkit-font-smoothing: antialiased; }
::-webkit-scrollbar { width: 7px; height: 7px; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
::-webkit-scrollbar-track { background: transparent; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
button { cursor: pointer; }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition-duration: .01ms !important; animation-duration: .01ms !important; } }

/* ── Layout ── */
.shell { min-height: 100vh; display: flex; flex-direction: column; }
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  height: 60px;
  display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: var(--shadow-sm);
}
.topbar-logo {
  width: 32px; height: 32px; border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--accent) 0%, var(--indigo) 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 800; color: #fff;
  box-shadow: 0 2px 8px rgba(37,99,235,.35);
  flex-shrink: 0;
}
.topbar-title { font-size: 15px; font-weight: 700; color: var(--text); }
.topbar-sub { font-size: 12px; color: var(--text-3); font-weight: 400; }
.topbar-spacer { flex: 1; }
.topbar-date {
  font-size: 12px; color: var(--text-2); font-weight: 500;
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 6px 14px;
}
.topbar-bell {
  width: 36px; height: 36px; border-radius: var(--radius-md);
  border: 1px solid var(--border); background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2); font-size: 16px; position: relative;
  transition: var(--transition);
}
.topbar-bell:hover { background: var(--bg); border-color: var(--border-strong); color: var(--text); }
.topbar-bell-dot {
  position: absolute; top: 7px; left: 7px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--red); border: 1.5px solid var(--surface);
}
.topbar-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent) 0%, var(--indigo) 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff;
  box-shadow: 0 2px 6px rgba(37,99,235,.3);
  flex-shrink: 0;
}

/* ── Main Content ── */
.main { flex: 1; padding: 28px 32px 40px; max-width: 1400px; width: 100%; margin: 0 auto; }

/* ── Hero Greeting ── */
.hero {
  background: linear-gradient(135deg, #1E3A8A 0%, #2563EB 50%, #6366F1 100%);
  border-radius: var(--radius-xl);
  padding: 32px 36px;
  color: #fff;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 6px 24px rgba(37,99,235,.35);
}
.hero::before {
  content: '';
  position: absolute; top: -60px; left: -60px;
  width: 280px; height: 280px; border-radius: 50%;
  background: rgba(255,255,255,.06);
  pointer-events: none;
}
.hero::after {
  content: '';
  position: absolute; bottom: -80px; right: 30%;
  width: 220px; height: 220px; border-radius: 50%;
  background: rgba(255,255,255,.04);
  pointer-events: none;
}
.hero-greeting { font-size: 13px; font-weight: 500; color: rgba(255,255,255,.7); margin-bottom: 4px; }
.hero-name { font-size: 30px; font-weight: 800; color: #fff; margin-bottom: 6px; letter-spacing: -.3px; }
.hero-sub { font-size: 14px; color: rgba(255,255,255,.72); font-weight: 400; }
.hero-stats { display: flex; gap: 24px; margin-top: 24px; }
.hero-stat {
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.18);
  border-radius: var(--radius-md);
  padding: 12px 18px;
  backdrop-filter: blur(10px);
  flex: 1; max-width: 140px;
}
.hero-stat-val { font-size: 24px; font-weight: 800; color: #fff; line-height: 1; }
.hero-stat-lbl { font-size: 11px; color: rgba(255,255,255,.65); margin-top: 3px; font-weight: 500; }

/* ── Section Header ── */
.sec-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.sec-hdr-title { font-size: 15px; font-weight: 700; color: var(--text); }
.sec-hdr-count {
  background: var(--accent-light); color: var(--accent);
  border-radius: 20px; padding: 1px 9px; font-size: 11px; font-weight: 700;
}
.sec-hdr-link {
  margin-right: auto; font-size: 12px; color: var(--accent); font-weight: 600;
  background: none; border: none; text-decoration: none; transition: opacity .15s;
}
.sec-hdr-link:hover { opacity: .75; }

/* ── Grid ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 24px; }
.col-span-2 { grid-column: span 2; }

/* ── Card ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--shadow-sm);
}

/* ── KPI Cards ── */
.kpi { padding: 18px 20px; }
.kpi-icon {
  width: 40px; height: 40px; border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; margin-bottom: 12px;
}
.kpi-val { font-size: 26px; font-weight: 800; color: var(--text); line-height: 1; margin-bottom: 2px; }
.kpi-lbl { font-size: 12px; color: var(--text-2); font-weight: 500; }
.kpi-delta { font-size: 11px; font-weight: 600; margin-top: 6px; display: flex; align-items: center; gap: 3px; }
.kpi-delta.up { color: var(--green); }
.kpi-delta.dn { color: var(--red); }

/* ── Project Cards ── */
.proj-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
  cursor: pointer;
}
.proj-card:hover { box-shadow: var(--shadow-md); border-color: var(--border-strong); transform: translateY(-1px); }
.proj-card-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
.proj-icon {
  width: 38px; height: 38px; border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
}
.proj-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.proj-client { font-size: 12px; color: var(--text-3); font-weight: 400; }
.proj-status-pill {
  margin-right: auto;
  font-size: 11px; font-weight: 600;
  border-radius: 20px; padding: 3px 10px;
  white-space: nowrap;
}
.proj-progress-bar {
  height: 5px; background: var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 10px;
}
.proj-progress-fill { height: 100%; border-radius: 10px; transition: width .5s ease; }
.proj-meta { display: flex; justify-content: space-between; align-items: center; }
.proj-meta-item { font-size: 11px; color: var(--text-3); font-weight: 500; }
.proj-meta-val { font-weight: 700; color: var(--text-2); }
.proj-deadline { font-size: 11px; font-weight: 600; color: var(--orange); background: var(--orange-light); border-radius: 5px; padding: 2px 7px; }
.proj-deadline.ok { color: var(--green); background: var(--green-light); }

/* ── Urgent Tasks ── */
.task-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.task-item:last-child { border-bottom: none; padding-bottom: 0; }
.task-item:first-child { padding-top: 0; }
.task-status-dot {
  width: 10px; height: 10px; border-radius: 50%;
  flex-shrink: 0; margin-top: 4px;
}
.task-body { flex: 1; min-width: 0; }
.task-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-proj { font-size: 11px; color: var(--text-3); font-weight: 500; margin-bottom: 5px; }
.task-tags { display: flex; gap: 5px; flex-wrap: wrap; }
.task-tag {
  font-size: 10px; font-weight: 700; border-radius: 4px;
  padding: 2px 7px; white-space: nowrap;
}
.task-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.task-date { font-size: 11px; color: var(--text-3); font-weight: 500; }
.task-date.overdue { color: var(--red); font-weight: 600; }
.task-priority {
  font-size: 10px; font-weight: 700; border-radius: 4px;
  padding: 2px 7px;
}

/* ── Gantt ── */
.gantt-wrap { overflow-x: auto; }
.gantt { min-width: 700px; }
.gantt-header { display: flex; margin-bottom: 8px; }
.gantt-label-col { width: 200px; flex-shrink: 0; }
.gantt-timeline { flex: 1; display: flex; }
.gantt-month {
  flex: 1; text-align: center; font-size: 11px; font-weight: 600;
  color: var(--text-3); padding-bottom: 4px;
  border-left: 1px dashed var(--border);
}
.gantt-month:first-child { border-left: none; }
.gantt-row { display: flex; align-items: center; margin-bottom: 8px; position: relative; }
.gantt-row-label { width: 200px; flex-shrink: 0; padding-left: 8px; }
.gantt-row-name { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gantt-row-sub { font-size: 10px; color: var(--text-3); font-weight: 400; }
.gantt-track { flex: 1; height: 28px; background: var(--border); border-radius: 4px; position: relative; overflow: visible; }
.gantt-bg-grid {
  position: absolute; top: 0; bottom: 0; left: 0; right: 0;
  display: flex; pointer-events: none;
}
.gantt-bg-col { flex: 1; border-left: 1px dashed rgba(0,0,0,.06); }
.gantt-bar {
  position: absolute; top: 4px; height: 20px;
  border-radius: 4px; display: flex; align-items: center;
  padding: 0 8px; font-size: 10px; font-weight: 700; color: #fff;
  white-space: nowrap; overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,.15);
  transition: filter .15s;
}
.gantt-bar:hover { filter: brightness(1.1); }
.gantt-milestone {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--surface); border: 2.5px solid;
  box-shadow: 0 1px 4px rgba(0,0,0,.15);
}
.gantt-today-line {
  position: absolute; top: -4px; bottom: -4px;
  width: 2px; background: var(--red);
  border-radius: 1px; z-index: 5;
  pointer-events: none;
}
.gantt-today-line::before {
  content: 'היום';
  position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
  font-size: 9px; font-weight: 700; color: var(--red);
  background: var(--surface); border: 1px solid var(--red);
  border-radius: 3px; padding: 0 4px; white-space: nowrap;
}
.gantt-legend { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
.gantt-legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-2); font-weight: 500; }
.gantt-legend-dot { width: 12px; height: 12px; border-radius: 3px; }

/* ── Activity Feed ── */
.activity-item { display: flex; gap: 11px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.activity-item:last-child { border-bottom: none; padding-bottom: 0; }
.activity-item:first-child { padding-top: 0; }
.activity-icon {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}
.activity-body { flex: 1; min-width: 0; }
.activity-text { font-size: 12px; color: var(--text); font-weight: 500; line-height: 1.5; }
.activity-text strong { color: var(--accent); }
.activity-time { font-size: 11px; color: var(--text-3); margin-top: 2px; }

/* ── Weather-like Summary Bar ── */
.summary-bar {
  display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
}
.summary-item {
  flex: 1; min-width: 120px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 14px 16px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: var(--shadow-sm);
}
.summary-item-icon { font-size: 20px; }
.summary-item-val { font-size: 16px; font-weight: 800; color: var(--text); line-height: 1; }
.summary-item-lbl { font-size: 11px; color: var(--text-3); font-weight: 500; margin-top: 1px; }

/* ── Quick Actions ── */
.quick-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
.quick-btn {
  display: flex; align-items: center; gap: 7px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 9px 16px;
  font-size: 13px; font-weight: 600; color: var(--text-2);
  font-family: inherit; transition: var(--transition);
  box-shadow: var(--shadow-sm);
}
.quick-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 3px 10px rgba(37,99,235,.3); }
.quick-btn:hover .quick-btn-icon { color: #fff; }
.quick-btn-icon { font-size: 16px; }

/* ── Progress Ring ── */
.ring-wrap { display: flex; align-items: center; gap: 12px; }
.ring-info { flex: 1; }
.ring-name { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.ring-sub { font-size: 11px; color: var(--text-3); }
.ring-pct { font-size: 13px; font-weight: 800; color: var(--accent); }

/* ── Tag colors shorthand ── */
.tag-red { background: var(--red-light); color: var(--red); }
.tag-orange { background: var(--orange-light); color: var(--orange); }
.tag-amber { background: var(--amber-light); color: var(--amber); }
.tag-green { background: var(--green-light); color: var(--green); }
.tag-blue { background: var(--accent-light); color: var(--accent); }
.tag-purple { background: var(--purple-light); color: var(--purple); }
.tag-teal { background: var(--teal-light); color: var(--teal); }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate { animation: fadeInUp .35s ease both; }
.delay-1 { animation-delay: .05s; }
.delay-2 { animation-delay: .10s; }
.delay-3 { animation-delay: .15s; }
.delay-4 { animation-delay: .20s; }

@media (max-width: 900px) {
  .main { padding: 20px 16px 32px; }
  .grid-2 { grid-template-columns: 1fr; }
  .grid-3 { grid-template-columns: 1fr 1fr; }
  .hero-stats { gap: 12px; }
  .col-span-2 { grid-column: span 1; }
}
@media (max-width: 600px) {
  .grid-3 { grid-template-columns: 1fr; }
  .topbar { padding: 0 16px; }
  .hero { padding: 24px 20px; }
  .hero-name { font-size: 22px; }
}
</style>
</head>

// 8 months: Mar–Oct 2026. We calculate positions as % within that range.
const GANTT_START = new Date('2026-03-01');
const GANTT_END   = new Date('2026-11-01');
const GANTT_TOTAL_DAYS = (GANTT_END - GANTT_START) / 86400000;
function pct(dateStr) {
  const d = new Date(dateStr);
  return Math.max(0, Math.min(100, ((d - GANTT_START) / 86400000 / GANTT_TOTAL_DAYS) * 100));
}

function TopBar({ date }) {

  const d = new Date(date);
  const label = `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
  return (
    <div className="topbar">

function SummaryBar({ projects }) {
  const overdueTasks = URGENT_TASKS.filter(t => t.overdue).length;
  const avgProgress = Math.round(projects.reduce((a,p) => a + p.progress, 0) / projects.length);
  const nextDeadline = projects
    .filter(p => p.status !== 'הושלם')
    .sort((a,b) => new Date(a.deadline) - new Date(b.deadline))[0];
  const daysToDeadline = nextDeadline
    ? Math.ceil((new Date(nextDeadline.deadline) - new Date('2026-06-14')) / 86400000)
    : null;

  return (
    <div className="summary-bar animate delay-1">
      <div className="summary-item">
        <span className="summary-item-icon">⏰</span>
        <div>

              {GANTT_MONTHS.map(m => <div key={m} className="gantt-month">{m}</div>)}
            </div>
          </div>

          {/* Rows */}
          {GANTT_ROWS.map((row, ri) => (
            <div key={ri} className="gantt-row">

                <div className="gantt-row-name">{row.name}</div>

              <div className="gantt-track">

                  {GANTT_MONTHS.map((_,i)=><div key={i} className="gantt-bg-col"/>)}
                </div>
                {/* Today line */}
                <div className="gantt-today-line" style={{right:`${todayPct}%`}} />
                {/* Bars */}
                {row.bars.map((bar, bi) => {
                  const l = pct(bar.start);
                  const w = pct(bar.end) - l;
                  return (
                    <div key={bi} className="gantt-bar" title={bar.label}

                {row.milestones.map((ms, mi) => (
                  <div key={mi} className="gantt-milestone" title={ms.tip}

  );

          <MilestoneWidget />
          <UrgentTasks />
        </div>

        {/* Gantt */}
        <div style={{marginBottom:24}}>
          <GanttChart />
        </div>

        {/* Progress + Activity */}
        <div className="grid-2" style={{marginBottom:0}}>
          <ProjectProgress projects={PROJECTS} />
          <ActivityFeed />
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
