/* ListView wrapper — provides lists context */
function ListViewWithCtx({data, save}) {
  const priorities  = data.priorities  || PRIORITIES;
  const disciplines = data.disciplines || DISCIPLINES;
  const statuses    = data.statuses    || STATUSES;
  const [editList, setEditList] = useState(null);
  const savePartial = patch => save({...data,...patch});

  const listTitle = t => t==='priority'?'עריכת עדיפויות':t==='status'?'עריכת סטטוסים':'עריכת תחומים';
  const listItems = t => t==='priority'?priorities:t==='status'?statuses:disciplines;

  return (
    <ListsCtx.Provider value={{
      priorities,
      disciplines,
      statuses,
      team: data.team || [],
      onEditList: type => setEditList(type),
    }}>
      <ListView data={data} save={save}/>
      {editList&&(
        <EditListModal
          title={listTitle(editList)}
          items={listItems(editList)}
          previewType={editList==='status'?'status':'pill'}
          onSave={items=>{
            if(editList==='priority') savePartial({priorities:items});
            else if(editList==='status') savePartial({statuses:items});
            else savePartial({disciplines:items});
            setEditList(null);
          }}
          onClose={()=>setEditList(null)}
        />
      )}
    </ListsCtx.Provider>
  );
}

/* ══════════════════════════════════════
   Dashboard View
══════════════════════════════════════ */
function Confetti({onDone}) {
  const canvasRef = useRef(null);
  useEffect(()=>{
    const canvas = canvasRef.current;
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    const COLORS = ['#FFD700','#059669','#3B82F6','#8B5CF6','#EF4444','#F59E0B','#EC4899','#10B981','#06B6D4'];
    const particles = Array.from({length:180},()=>({
      x: Math.random()*canvas.width,
      y: Math.random()*-canvas.height*0.6 - 10,
      w: Math.random()*10+4,
      h: Math.random()*5+2,
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      speed: Math.random()*4+2,
      drift: (Math.random()-0.5)*3,
      angle: Math.random()*Math.PI*2,
      spin: (Math.random()-0.5)*.18,
    }));
    const start = Date.now();
    const DURATION = 5000;
    let raf;
    const draw=()=>{
      const elapsed = Date.now()-start;
      if(elapsed>DURATION){ ctx.clearRect(0,0,canvas.width,canvas.height); onDone&&onDone(); return; }
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const opacity = elapsed>3500 ? 1-(elapsed-3500)/1500 : 1;
      particles.forEach(p=>{
        p.y+=p.speed; p.x+=p.drift; p.angle+=p.spin;
        if(p.y>canvas.height+20){ p.y=-20; p.x=Math.random()*canvas.width; }
        ctx.save();
        ctx.globalAlpha=opacity;
        ctx.translate(p.x,p.y);
        ctx.rotate(p.angle);
        ctx.fillStyle=p.color;
        ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
        ctx.restore();
      });
      raf=requestAnimationFrame(draw);
    };
    raf=requestAnimationFrame(draw);
    return()=>cancelAnimationFrame(raf);
  },[]);
  return ReactDOM.createPortal(
    <canvas ref={canvasRef} style={{position:'fixed',top:0,left:0,
      width:'100%',height:'100%',zIndex:9999,pointerEvents:'none'}}/>,
    document.body
  );
}

/* ══════════════════════════════════════
   Nihul Tikhnun View
══════════════════════════════════════ */
/* Track/stage hierarchy is data-driven via data.tracks (edited in the
   טמפלייט → סכימת עבודה page) — see seedTracksIfMissing for the legacy
   defaults old saved data is migrated from. */
const trackLabelOf = (tracks, s) => (tracks.find(t => t.trackValue===s.track) || {}).label || (s.track || 'ניהול שוטף');

function NihulTikhnunView({data, save}) {
  const priorities  = data.priorities  || PRIORITIES;
  const disciplines = data.disciplines || DISCIPLINES;
  const statuses    = data.statuses    || STATUSES;
  const [editList, setEditList] = useState(null);
  const [activeTrackTab, setActiveTrackTab] = useState('combined');
  const ntTracks = data.tracks || [];

  const allSheets = data.sheets || [];
  const isCombinedTab = activeTrackTab==='combined';
  const activeTrack = ntTracks.find(t => t.id===activeTrackTab) || ntTracks[0];
  const visibleSheets = isCombinedTab || !activeTrack ? [] : allSheets.filter(s => s.type==='list' && s.track===activeTrack.trackValue);

  const [collStage, setCollStage] = useState({});
  const toggleStage = id => setCollStage(c => ({...c, [id]: !c[id]}));

  /* Persist a single stage sheet's patched data back into data.sheets.
     ListView calls save() with the fully-merged sheet object. */
  const saveSheet = (sheetId, fullSheet) =>
    save({...data, sheets: data.sheets.map(s => s.id===sheetId ? fullSheet : s)});

  /* ── Combined view — merges tasks from every stage/track into one ListView,
     tagged with __srcSheetId/__track/__stage so מסלול/שלב become real
     group-by + filter fields. Edits route back to their origin sheet;
     view/column settings live in their own data.combinedView slot. */
  const combinedSourceSheets = allSheets.filter(s => s.type==='list');
  const combinedMeta = data.combinedView || {id:'__combined__', name:'מבט מאוחד', groups:[], fields:[], hiddenCols:{}, colOrder:[], colWidths:{}, views:[]};
  const ongoingSheetId = (allSheets.find(s => s.type==='list' && s.track==null) || {}).id;
  const realGroupOwner = gId => combinedSourceSheets.find(s => (s.groups||[]).some(g => g.id===gId));
  const combinedData = isCombinedTab ? {
    ...combinedMeta,
    type:'list',
    __combined:true,
    groups: [...combinedSourceSheets.flatMap(s => s.groups||[]), ...(combinedMeta.groups||[])],
    tasks: combinedSourceSheets.flatMap(s => (s.tasks||[]).map(t => ({...t, __srcSheetId:s.id, __track:trackLabelOf(ntTracks, s), __stage:s.name}))),
  } : null;
  const saveCombined = patch => {
    let metaPatch = {...patch};
    let newSheets = data.sheets;
    if ('tasks' in patch) {
      const bySheet = {};
      patch.tasks.forEach(t => {
        const sid = t.__srcSheetId || ongoingSheetId || combinedSourceSheets[0]?.id;
        const {__srcSheetId, __track, __stage, ...clean} = t;
        (bySheet[sid] = bySheet[sid] || []).push(clean);
      });
      newSheets = data.sheets.map(s => bySheet[s.id] ? {...s, tasks:bySheet[s.id]} : s);
      delete metaPatch.tasks;
    }
    if ('groups' in patch) {
      const byRealSheet = {};
      const virtualGroups = [];
      patch.groups.forEach(g => {
        const owner = realGroupOwner(g.id);
        if (owner) (byRealSheet[owner.id] = byRealSheet[owner.id] || []).push(g);
        else virtualGroups.push(g);
      });
      newSheets = newSheets.map(s => byRealSheet[s.id] ? {...s, groups:byRealSheet[s.id]} : s);
      metaPatch.groups = virtualGroups;
    }
    save({...data, sheets:newSheets, combinedView:{...combinedMeta, ...metaPatch}});
  };

  const listTitle = t => t==='priority'?'עריכת עדיפויות':t==='status'?'עריכת סטטוסים':'עריכת תחומים';
  const listItems = t => t==='priority'?priorities:t==='status'?statuses:disciplines;
  const savePartial = patch => save({...data,...patch});

  return (
    <ListsCtx.Provider value={{
      priorities, disciplines, statuses,
      team: data.team || [],
      onEditList: type => setEditList(type),
    }}>
      <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden'}}>
        <div style={{display:'flex', borderBottom:'1px solid var(--border)', background:'var(--surface)', flexShrink:0}}>
          {[{id:'combined', label:'מבט מאוחד'}].map(t => (
            <button key={t.id} onClick={() => setActiveTrackTab(t.id)}
              style={{padding:'9px 16px', fontSize:12, fontFamily:'inherit', border:'none', cursor:'pointer',
                background:'none', borderBottom:'2px solid',
                borderBottomColor: activeTrackTab===t.id ? 'var(--accent)' : 'transparent',
                fontWeight: activeTrackTab===t.id ? 700 : 400,
                color: activeTrackTab===t.id ? 'var(--text)' : 'var(--text-2)'}}>
              {t.label}
            </button>
          ))}
        </div>
        <div style={{flex:1, overflowY:'auto', background:'var(--bg)'}}>
          {isCombinedTab && <ListView data={combinedData} save={saveCombined}/>}
          {!isCombinedTab && visibleSheets.map(sheet => {
            const collapsed = collStage[sheet.id];
            return (
              <React.Fragment key={sheet.id}>
                {/* ── Stage divider — only needed when there's more than one sheet to tell apart ── */}
                {visibleSheets.length>1 && (
                  <div style={{
                    display:'flex', alignItems:'center', gap:10,
                    padding:'10px 20px', background:'var(--surface)',
                    borderBottom:'1px solid var(--border)', borderTop:'4px solid var(--bg)',
                    cursor:'pointer', userSelect:'none',
                  }} onClick={() => toggleStage(sheet.id)}>
                    <span style={{fontSize:10, color:'var(--text-3)', display:'inline-block',
                      transform: collapsed ? 'rotate(-90deg)' : '', transition:'transform .15s'}}>▾</span>
                    <span style={{width:11, height:11, borderRadius:3, background:'#2563EB', flexShrink:0, display:'inline-block'}}/>
                    <span style={{fontSize:10, fontWeight:600, color:'var(--text-3)', background:'var(--bg)', border:'1px solid var(--border)', borderRadius:4, padding:'1px 6px'}}>{activeTab.label}</span>
                    <span style={{fontWeight:700, fontSize:13, color:'var(--text)'}}>שלב: {sheet.name}</span>
                    <span style={{fontSize:11, color:'var(--text-3)', marginRight:'auto'}}>{(sheet.tasks||[]).length} משימות</span>
                  </div>
                )}

                {/* ── The exact same list view used in מסלול רישוי ── */}
                {(visibleSheets.length===1 || !collapsed) && <ListView data={sheet} save={patch => saveSheet(sheet.id, patch)}/>}
              </React.Fragment>
            );
          })}
          {!isCombinedTab && visibleSheets.length===0 && (
            <div style={{padding:'24px 20px', fontSize:12, color:'var(--text-3)'}}>אין שלבים במסלול זה</div>
          )}
        </div>
      </div>
      {editList&&(
        <EditListModal
          title={listTitle(editList)}
          items={listItems(editList)}
          previewType={editList==='status'?'status':'pill'}
          onSave={items=>{
            if(editList==='priority') savePartial({priorities:items});
            else if(editList==='status') savePartial({statuses:items});
            else savePartial({disciplines:items});
            setEditList(null);
          }}
          onClose={()=>setEditList(null)}
        />
      )}
    </ListsCtx.Provider>
  );
}

function DashboardView({data, save, onSwitchSheet}) {
  const [confetti, setConfetti] = useState(false);
  const sheets = (data.sheets||[]).filter(s=>s.type==='list' && s.track==='licensing');
  const today = todayISO();

  /* Per-sheet date range from tasks */
  const sheetMeta = sheets.map(sheet=>{
    const tasks = sheet.tasks||[];
    const done  = tasks.filter(t=>t.statusId==='C'||t.done).length;
    const stuck = tasks.filter(t=>t.statusId==='S').length;
    const pct   = tasks.length ? Math.round(done/tasks.length*100) : 0;
    const starts = tasks.map(t=>t.startDate).filter(Boolean).sort();
    const ends   = tasks.map(t=>t.dueDate).filter(Boolean).sort();
    const startD = starts[0]||null;
    const endD   = ends[ends.length-1]||null;
    const days   = startD&&endD ? daysBetween(startD, endD) : null;
    return {sheet, tasks, done, stuck, pct, startD, endD, days};
  });

  /* Gantt: global time range */
  const allStarts = sheetMeta.map(m=>m.startD).filter(Boolean).sort();
  const allEnds   = sheetMeta.map(m=>m.endD).filter(Boolean).sort();
  const ganttMin  = allStarts[0]||today;
  const ganttMax  = [allEnds[allEnds.length-1],today].filter(Boolean).sort().reverse()[0]||today;
  const ganttSpan = Math.max(1, daysBetween(ganttMin, ganttMax));

  const fmtD = iso => iso ? fmtDateFull(iso) : '—';
  const GANTT_COLORS = ['#3B82F6','#8B5CF6','#10B981','#F59E0B','#EF4444','#06B6D4'];

  return (
    <>
    {confetti&&<Confetti onDone={()=>setConfetti(false)}/>}
    <div style={{padding:'28px 24px',overflow:'auto',flex:1,background:'var(--bg)'}}>
      <div style={{maxWidth:960,margin:'0 auto',display:'flex',flexDirection:'column',gap:28}}>

        {/* ── Cards ── */}
        <div>
          <h2 style={{fontSize:15,fontWeight:700,marginBottom:14,color:'var(--text)'}}>סטטוס שלבי הפרויקט</h2>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(210px,1fr))',gap:12}}>
            {sheetMeta.map(({sheet,tasks,done,stuck,pct,startD,endD,days},i)=>{
              const open = tasks.length - done;
              const color = pct===100?'#059669':stuck?'#EF4444':GANTT_COLORS[i%GANTT_COLORS.length];
              return (
              <div key={sheet.id} onClick={()=>onSwitchSheet(sheet.id)}
                style={{cursor:'pointer',padding:'14px 16px',borderRadius:12,
                  background:'var(--surface)',border:`1px solid ${stuck?'rgba(239,68,68,.3)':'var(--border)'}`,
                  boxShadow:'0 1px 4px rgba(0,0,0,.06)',transition:'box-shadow .15s'}}
                onMouseEnter={e=>e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,.1)'}
                onMouseLeave={e=>e.currentTarget.style.boxShadow='0 1px 4px rgba(0,0,0,.06)'}>
                <div style={{fontWeight:700,fontSize:14,marginBottom:8,color:'var(--text)'}}>{sheet.name}</div>
                <div style={{height:5,borderRadius:3,background:'var(--border)',marginBottom:8}}>
                  <div style={{height:5,borderRadius:3,background:color,width:pct+'%',transition:'width .4s'}}/>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:startD?6:0}}>
                  <div style={{display:'flex',flexDirection:'column',gap:2}}>
                    {tasks.length===0
                      ? <span style={{fontSize:11,color:'var(--text-3)'}}>טרם נוספו משימות</span>
                      : <>
                          <span style={{fontSize:11,color:open>0?'var(--text)':'#059669',fontWeight:600}}>
                            {open>0?`${open} פתוחות`:'✓ הכל הושלם'}
                          </span>
                          <span style={{fontSize:10,color:'var(--text-3)'}}>
                            {done}/{tasks.length} הושלמו
                          </span>
                        </>
                    }
                  </div>
                  <div style={{display:'flex',gap:4,alignItems:'center'}}>
                    {stuck>0&&<span style={{fontSize:10,fontWeight:700,color:'#fff',background:'#EF4444',borderRadius:10,padding:'1px 7px'}}>⚠ {stuck}</span>}
                  </div>
                </div>
                {startD&&(
                  <div style={{fontSize:10,color:'var(--text-3)',borderTop:'1px solid var(--border)',paddingTop:6,marginTop:4,display:'flex',justifyContent:'space-between'}}>
                    <span>{fmtD(startD)} → {fmtD(endD)}</span>
                    {days!==null&&<span style={{fontWeight:600,color:'var(--text-2)'}}>{days} י׳</span>}
                  </div>
                )}
              </div>
            );})}
          </div>
        </div>

        {/* ── Goals + Milestones row ── */}
        {(()=>{
          /* ── shared status config ── */
          const STATUS_CFG = {
            not_started: {label:'לא התחיל', color:'var(--text-3)',   bg:'var(--bg)',           border:'var(--border)'},
            in_progress: {label:'בעבודה',   color:'var(--accent)',   bg:'rgba(37,99,235,.08)', border:'rgba(37,99,235,.25)'},
            stuck:       {label:'תקוע',     color:'#EF4444',         bg:'rgba(239,68,68,.08)', border:'rgba(239,68,68,.3)'},
            done:        {label:'✓ בוצע',   color:'#059669',         bg:'rgba(5,150,105,.1)',  border:'rgba(5,150,105,.3)'},
          };
          const resolveStatus = (item) => item.status || (item.done ? 'done' : 'not_started');

          /* days X / Y: X = elapsed from effectiveStart to today, Y = total span */
          const daysXofY = (startDate, endDate) => {
            const sd = startDate || ganttMin; /* fallback to project start */
            if (!sd || !endDate) return null;
            const total   = Math.max(1, daysBetween(sd, endDate));
            const elapsed = Math.max(0, Math.min(total, daysBetween(sd, today)));
            return {elapsed, total};
          };

          /* ── Status dropdown ── */
          const StatusDropdown = ({value, onChange}) => {
            const [open, setOpen] = React.useState(false);
            const cfg = STATUS_CFG[value] || STATUS_CFG.not_started;
            return (
              <div style={{position:'relative',width:82,flexShrink:0}}>
                <div onClick={e=>{e.stopPropagation();setOpen(o=>!o);}}
                  style={{textAlign:'center',fontSize:11,fontWeight:700,cursor:'pointer',
                    color:cfg.color,background:cfg.bg,border:`1px solid ${cfg.border}`,
                    borderRadius:10,padding:'3px 0',userSelect:'none',transition:'all .15s'}}>
                  {cfg.label} ▾
                </div>
                {open && (
                  <div onClick={e=>e.stopPropagation()}
                    style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,
                      background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,
                      boxShadow:'0 4px 16px rgba(0,0,0,.12)',zIndex:999,overflow:'hidden'}}>
                    {Object.entries(STATUS_CFG).map(([k,c])=>(
                      <div key={k} onClick={()=>{onChange(k);setOpen(false);}}
                        style={{padding:'7px 12px',fontSize:12,fontWeight:600,cursor:'pointer',
                          color:c.color,background:value===k?c.bg:'transparent',
                          transition:'background .1s'}}
                        onMouseEnter={e=>e.currentTarget.style.background=c.bg}
                        onMouseLeave={e=>e.currentTarget.style.background=value===k?c.bg:'transparent'}>
                        {c.label}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          };

          /* ── column header ── */
          const ColHdr = ({children, w, align}) => (
            <div style={{width:w,flexShrink:0,fontSize:10,fontWeight:700,color:'var(--text-3)',
              textTransform:'uppercase',letterSpacing:.4,textAlign:align||'right',paddingBottom:6,
              borderBottom:'1px solid var(--border)'}}>
              {children}
            </div>
          );

          /* ── Goals panel ── */
          const GoalsPanel = () => {
            const goals = data.licensingGoals||[];
            const doneGoals = goals.filter(g=>resolveStatus(g)==='done').length;
            const pct = goals.length ? Math.round(doneGoals/goals.length*100) : 0;

            const saveGoals = upd => save({...data, licensingGoals: upd});
            const addGoal = () => saveGoals([...goals,
              {id:uid(), title:'', targetDate:'', startDate:today, status:'not_started', done:false}]);
            const delGoal = id => saveGoals(goals.filter(g=>g.id!==id));
            const updGoal = (id,patch) => saveGoals(goals.map(g=>g.id===id?{...g,...patch}:g));
            const setGoalStatus = (id, ns) => {
              const willDone = ns==='done';
              updGoal(id,{status:ns, done:ns==='done'});
              if(willDone) setConfetti(true);
            };

            return (
              <div style={{background:'var(--surface)',borderRadius:12,border:'1px solid var(--border)',
                padding:'18px 20px',flex:'1 1 0%',minWidth:0}}>
                {/* header */}
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                  <h2 style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>יעדים</h2>
                  <span style={{fontSize:12,color:'var(--text-2)',fontWeight:600}}>{doneGoals}/{goals.length} הושגו</span>
                </div>
                {/* progress bar */}
                <div style={{height:4,borderRadius:2,background:'var(--border)',marginBottom:14}}>
                  <div style={{height:4,borderRadius:2,background:pct===100?'#059669':'var(--accent)',
                    width:pct+'%',transition:'width .5s'}}/>
                </div>
                {/* column headers */}
                <div style={{display:'flex',alignItems:'flex-end',gap:8,paddingBottom:2}}>
                  <ColHdr w="auto">תיאור</ColHdr>
                  <div style={{flex:1}}/>
                  <ColHdr w={80} align="center">תאריך יעד</ColHdr>
                  <ColHdr w={62} align="center">ימים</ColHdr>
                  <ColHdr w={82} align="center">סטטוס</ColHdr>
                  <div style={{width:20}}/>
                </div>
                {/* rows */}
                {goals.map((g,i)=>{
                  const st = resolveStatus(g);
                  const cfg = STATUS_CFG[st];
                  const xy = daysXofY(g.startDate, g.targetDate);
                  const isLate = st!=='done' && g.targetDate && g.targetDate < today;
                  return (
                    <div key={g.id} style={{display:'flex',alignItems:'center',gap:8,
                      padding:'7px 0',borderBottom:i<goals.length-1?'1px solid var(--border)':'none'}}>
                      {/* title */}
                      <input value={g.title||''} placeholder="שם יעד…"
                        onChange={e=>updGoal(g.id,{title:e.target.value})}
                        style={{flex:1,border:'none',outline:'none',fontSize:13,fontWeight:600,
                          background:'transparent',color:st==='done'?'var(--text-2)':'var(--text)',
                          textDecoration:st==='done'?'line-through':'none',fontFamily:'inherit',
                          minWidth:0}}/>
                      {/* target date */}
                      <input type="date" value={g.targetDate||''}
                        onChange={e=>updGoal(g.id,{targetDate:e.target.value})}
                        style={{width:80,border:'none',outline:'none',fontSize:11,background:'transparent',
                          color:isLate?'#EF4444':'var(--text-2)',fontFamily:'monospace',textAlign:'center',
                          cursor:'pointer',fontFamily:'inherit'}}/>
                      {/* days X/Y */}
                      <div style={{width:62,textAlign:'center',fontSize:11,fontWeight:600,
                        color:isLate?'#EF4444':'var(--text-3)',fontFamily:'monospace'}}>
                        {xy ? `${xy.elapsed}/${xy.total}` : g.targetDate ? `${daysBetween(today,g.targetDate)}י` : '—'}
                      </div>
                      {/* status dropdown */}
                      <StatusDropdown value={st} onChange={ns=>setGoalStatus(g.id,ns)}/>
                      {/* delete */}
                      <button onClick={()=>delGoal(g.id)}
                        style={{width:20,height:20,border:'none',background:'none',cursor:'pointer',
                          color:'var(--text-3)',fontSize:14,lineHeight:1,borderRadius:4,padding:0,
                          display:'flex',alignItems:'center',justifyContent:'center'}}
                        title="מחק">×</button>
                    </div>
                  );
                })}
                {/* add button */}
                <button onClick={addGoal}
                  style={{marginTop:10,width:'100%',border:'1px dashed var(--border)',background:'none',
                    borderRadius:8,padding:'6px 0',fontSize:12,color:'var(--text-3)',cursor:'pointer',
                    fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',gap:5,
                    transition:'all .15s'}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--accent)';e.currentTarget.style.color='var(--accent)';}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--text-3)';}}>
                  <span style={{fontSize:16,lineHeight:1}}>+</span> הוסף יעד
                </button>
              </div>
            );
          };

          /* ── Milestones panel ── */
          const MsPanel = () => {
            const milestones = data.licensingMilestones||[];
            const saveMss = upd => save({...data, licensingMilestones: upd});
            const addMs  = () => saveMss([...milestones,
              {id:uid(), title:'', date:'', startDate:today, status:'not_started', done:false}]);
            const delMs  = id => saveMss(milestones.filter(m=>m.id!==id));
            const updMs  = (id,patch) => saveMss(milestones.map(m=>m.id===id?{...m,...patch}:m));
            const setMsStatus = (id, ns) => {
              const willDone = ns==='done';
              updMs(id,{status:ns, done:ns==='done'});
              if(willDone) setConfetti(true);
            };

            return (
              <div style={{background:'var(--surface)',borderRadius:12,border:'1px solid var(--border)',
                padding:'18px 20px',flex:'1 1 0%',minWidth:0}}>
                {/* header */}
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                  <h2 style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>אבני דרך</h2>
                  <span style={{fontSize:12,color:'var(--text-2)',fontWeight:600}}>
                    {milestones.filter(m=>resolveStatus(m)==='done').length}/{milestones.length} הושלמו
                  </span>
                </div>
                {/* column headers */}
                <div style={{display:'flex',alignItems:'flex-end',gap:8,paddingBottom:2}}>
                  <ColHdr w="auto">תיאור</ColHdr>
                  <div style={{flex:1}}/>
                  <ColHdr w={80} align="center">תאריך</ColHdr>
                  <ColHdr w={62} align="center">ימים</ColHdr>
                  <ColHdr w={82} align="center">סטטוס</ColHdr>
                  <div style={{width:20}}/>
                </div>
                {/* rows */}
                {milestones.map((m,i)=>{
                  const st = resolveStatus(m);
                  const cfg = STATUS_CFG[st];
                  const xy = daysXofY(m.startDate, m.date);
                  const isLate = st!=='done' && m.date && m.date < today;
                  return (
                    <div key={m.id} style={{display:'flex',alignItems:'center',gap:8,
                      padding:'7px 0',borderBottom:i<milestones.length-1?'1px solid var(--border)':'none'}}>
                      {/* diamond icon */}
                      <div style={{width:12,height:12,flexShrink:0,
                        background:st==='done'?'#059669':'transparent',
                        border:`2px solid ${st==='done'?'#059669':'#8B5CF6'}`,
                        borderRadius:2,transform:'rotate(45deg)'}}/>
                      {/* title */}
                      <input value={m.title||''} placeholder="שם אבן דרך…"
                        onChange={e=>updMs(m.id,{title:e.target.value})}
                        style={{flex:1,border:'none',outline:'none',fontSize:13,fontWeight:600,

                  onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--text-3)';}}>

          };

          return (
            <div style={{display:'flex',gap:14,alignItems:'stretch'}}>
              <GoalsPanel/>
              <MsPanel/>
            </div>
          );
        })()}

        {/* ── Gantt with monthly columns ── */}
        {(()=>{
          const [scrollOffset, setScrollOffset] = React.useState(0); // months offset
          const LABEL_W = 140;
          const COL_W   = 72; // px per month
          const VISIBLE  = 12; // months visible

          /* Build month list: start from ganttMin month − scroll, show VISIBLE months */
          const baseYM = new Date(ganttMin);
          baseYM.setDate(1);
          baseYM.setMonth(baseYM.getMonth() + scrollOffset);

          const months = Array.from({length:VISIBLE},(_,i)=>{
            const d = new Date(baseYM);
            d.setMonth(d.getMonth()+i);
            return d;
          });
          const viewStart = months[0].toISOString().slice(0,10);
          const viewEnd   = new Date(months[VISIBLE-1].getFullYear(), months[VISIBLE-1].getMonth()+1, 0)
                              .toISOString().slice(0,10);
          const viewSpan  = Math.max(1, daysBetween(viewStart, viewEnd));

          const HE_MONTHS_SHORT=['ינו','פבר','מרץ','אפר','מאי','יונ','יול','אוג','ספט','אוק','נוב','דצמ'];

          const toX = iso => Math.max(0, Math.min(1, daysBetween(viewStart,iso)/viewSpan)) * VISIBLE * COL_W;

          const todayX = daysBetween(viewStart,today)/viewSpan * VISIBLE * COL_W;
          const totalW = VISIBLE * COL_W;

          return (
            <div style={{background:'var(--surface)',borderRadius:12,border:'1px solid var(--border)',padding:'18px 20px'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
                <h2 style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>ציר זמן — גאנט</h2>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <button onClick={()=>setScrollOffset(o=>o-6)}
                    style={{padding:'3px 10px',fontSize:12,border:'1px solid var(--border-strong)',
                      borderRadius:6,cursor:'pointer',background:'var(--surface)',fontFamily:'inherit'}}>‹ 6 חודשים</button>
                  <button onClick={()=>setScrollOffset(0)}
                    style={{padding:'3px 10px',fontSize:12,border:'1px solid var(--accent)',
                      borderRadius:6,cursor:'pointer',background:'rgba(37,99,235,.06)',color:'var(--accent)',fontFamily:'inherit'}}>היום</button>
                  <button onClick={()=>setScrollOffset(o=>o+6)}
                    style={{padding:'3px 10px',fontSize:12,border:'1px solid var(--border-strong)',
                      borderRadius:6,cursor:'pointer',background:'var(--surface)',fontFamily:'inherit'}}>6 חודשים ›</button>
                </div>
              </div>

              <div style={{display:'flex',direction:'ltr'}}>
                {/* Labels column */}
                <div style={{width:LABEL_W,flexShrink:0,direction:'rtl'}}/>
                {/* Month header */}
                <div style={{flex:1,overflowX:'hidden'}}>
                  <div style={{display:'flex',width:totalW}}>
                    {months.map((m,i)=>(
                      <div key={i} style={{width:COL_W,flexShrink:0,textAlign:'center',
                        fontSize:10,fontWeight:600,color:m.getFullYear()===new Date(today).getFullYear()&&m.getMonth()===new Date(today).getMonth()?'var(--accent)':'var(--text-3)',
                        borderLeft:'1px solid var(--border)',paddingBottom:6}}>
                        {HE_MONTHS_SHORT[m.getMonth()]} {m.getFullYear()!==new Date().getFullYear()?m.getFullYear():''}
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              <div style={{display:'flex',flexDirection:'column',gap:8,direction:'ltr',position:'relative'}}>
                {/* milestone markers */}
                {(data.licensingMilestones||[]).map(m=>{
                  const mx = daysBetween(viewStart,m.date)/viewSpan * VISIBLE * COL_W;
                  if(mx<0||mx>totalW) return null;
                  const mColor = m.done?'#059669':'#8B5CF6';
                  return (
                    <div key={m.id} style={{position:'absolute',top:-2,bottom:-2,
                      left:LABEL_W+mx-1,width:1,background:mColor,
                      zIndex:9,pointerEvents:'none',opacity:.7}}>
                      <div style={{position:'absolute',top:-4,left:'50%',transform:'translateX(-50%)',
                        width:10,height:10,background:mColor,borderRadius:2,rotate:'45deg',
                        boxShadow:'0 0 0 2px #fff'}}/>
                      <div style={{position:'absolute',bottom:-18,left:'50%',transform:'translateX(-50%)',
                        whiteSpace:'nowrap',fontSize:9,fontWeight:700,color:mColor,
                        background:'#fff',padding:'0 3px',borderRadius:3}}>
                        {m.title}
                      </div>
                    </div>
                  );
                })}
                {/* single today line spanning all rows */}
                {todayX>=0&&todayX<=totalW&&(
                  <div style={{position:'absolute',top:0,bottom:0,
                    left:LABEL_W+todayX-1,width:2,background:'#EF4444',zIndex:10,pointerEvents:'none'}}>
                    <div style={{position:'absolute',top:-6,left:'50%',
                      transform:'translateX(-50%)',
                      width:8,height:8,borderRadius:'50%',background:'#EF4444',
                      boxShadow:'0 0 0 2px #fff'}}/>
                  </div>
                )}
                {sheetMeta.filter(m=>m.startD).map(({sheet,pct,startD,endD,days},i)=>{
                  const x1 = toX(startD);
                  const x2 = toX(endD||today);
                  const barW = Math.max(4, x2-x1);
                  const color = pct===100?'#059669':GANTT_COLORS[i%GANTT_COLORS.length];
                  return (
                    <div key={sheet.id} style={{display:'flex',alignItems:'center'}}>
                      <span style={{width:LABEL_W,flexShrink:0,fontSize:12,fontWeight:600,
                        color:'var(--text)',textAlign:'right',paddingRight:12,direction:'rtl'}}>{sheet.name}</span>
                      <div style={{flex:1,position:'relative',height:24}}>
                        <div style={{width:totalW,height:'100%',position:'relative'}}>
                          {/* month grid lines */}
                          {months.map((m,j)=>(
                            <div key={j} style={{position:'absolute',top:0,bottom:0,left:j*COL_W,
                              width:1,background:'var(--border)',opacity:.6}}/>
                          ))}
                          {/* bar */}
                          {x1<totalW&&x2>0&&(
                            <div onClick={()=>onSwitchSheet(sheet.id)}
                              title={`${sheet.name}: ${fmtD(startD)} → ${fmtD(endD||today)} | ${days??'?'} ימים`}
                              style={{position:'absolute',top:4,height:16,borderRadius:5,cursor:'pointer',
                                left:x1,width:barW,background:color,
                                opacity:.88,transition:'opacity .12s',zIndex:2,
                                display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}
                              onMouseEnter={e=>e.currentTarget.style.opacity=1}
                              onMouseLeave={e=>e.currentTarget.style.opacity=.88}>
                              {barW>40&&<span style={{fontSize:9,color:'#fff',fontWeight:700,whiteSpace:'nowrap'}}>
                                {days!=null?days+' י׳':''}
                              </span>}
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>

              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:14,direction:'rtl'}}>
                <div style={{display:'flex',alignItems:'center',gap:5,fontSize:10,color:'var(--text-3)'}}>
                  <div style={{width:14,height:2,background:'#EF4444',borderRadius:1}}/>
                  <span>היום — {fmtDateFull(today)}</span>
                </div>
                {(()=>{
                  const totalStart = allStarts[0];
                  const totalEnd   = allEnds[allEnds.length-1];
                  const totalDaysAll = totalStart&&totalEnd ? daysBetween(totalStart,totalEnd) : null;
                  return totalDaysAll!=null&&(
                    <div style={{display:'inline-flex',alignItems:'center',gap:6,
                      padding:'5px 14px',borderRadius:10,
                      background:'var(--bg)',border:'1px solid var(--border-strong)'}}>
                      <span style={{fontSize:14}}>⏳</span>
                      <span style={{fontSize:12,fontWeight:700,color:'var(--text)'}}>
                        {totalDaysAll} ימים
                      </span>
                      <span style={{fontSize:10,color:'var(--text-3)'}}>
                        סה״כ מסלול רישוי
                      </span>
                    </div>
                  );
                })()}
              </div>
            </div>
          );
        })()}

      </div>
    </div>
    </>
  );
}

function phaseDays(phase) {
  const today = todayISO();
  const msDay = 86400000;
  if(phase.status==='active' && phase.startDate && phase.endDate) {
    const elapsed = Math.round((new Date(today) - new Date(phase.startDate)) / msDay);
    const remaining = Math.round((new Date(phase.endDate) - new Date(today)) / msDay);
    const total = elapsed + Math.max(remaining, 0);
    const pct = total>0 ? Math.round(elapsed/total*100) : 100;
    return {elapsed, remaining, total, pct, overdue: remaining<0};
  }
  if(phase.status==='done' && phase.startDate && phase.endDate) {
    const dur = Math.round((new Date(phase.endDate) - new Date(phase.startDate)) / msDay);
    return {dur};
  }
  return null;
}

function hoursTotal(hours) {
  const b = Object.values(hours).reduce((s,h)=>s+h.budget,0);
  const a = Object.values(hours).reduce((s,h)=>s+h.actual,0);
  return {budget:b, actual:a, pct: b>0?Math.round(a/b*100):0, overrun: a>b};
}
function hoursStatus(budget, actual) {
  if(budget===0) return 'none';
  const r = actual/budget;
  if(r>1)    return 'overrun';  // חריגה
  if(r>0.85) return 'warning';  // אזהרה
  return 'ok';
}

                      {isActive&&<div style={{width:5,height:5,borderRadius:'50%',background:'#2563EB'}}/>}

                    <span style={{fontSize:11,fontWeight:700,color:isDone?'#059669':isActive?'#2563EB':'#9CA3AF'}}>{ph.id}</span>
                  </div>
                  {isDone&&days&&(
                    <span style={{fontSize:10,color:hasDoneOverrun?'#DC2626':hasDoneSaving?'#059669':'var(--text-3)'}}>
                      {ph.startDate.split('-').reverse().join('.')} — {ph.endDate.split('-').reverse().join('.')} · <strong>{actualDays} ימים</strong>
                      {hasDoneOverrun&&<span style={{fontWeight:700,color:'#DC2626'}}> · חריגה של {doneOverrunDays} ימים ⚠</span>}
                      {hasDoneSaving&&<span style={{fontWeight:700,color:'#059669'}}> · חסכון של {doneSavingDays} ימים ✓</span>}
                    </span>
                  )}
                  {isActive&&days&&(
                    <span style={{fontSize:10,fontWeight:600,color:isOverdue?'#DC2626':'var(--text-3)'}}>
                      {isOverdue
                        ?`⚠ באיחור ${Math.abs(days.remaining)} יום (${days.elapsed} ימים עברו, יעד ${plannedDays} ימים)`
                        :`${days.elapsed} ימים עברו · ${days.remaining} נותרו · יעד ${ph.endDate.split('-').reverse().join('.')}`}
                    </span>
                  )}
                  {isPending&&<span style={{fontSize:10,color:'#9CA3AF'}}>{ph.plannedMonths?`~${ph.plannedMonths} חודשים מתוכנן`:'ממתין'}</span>}
                  {isActive&&hasOverrun&&(
                    <span style={{fontSize:10,fontWeight:700,color:'#DC2626',background:'#FEF2F2',padding:'1px 7px',borderRadius:4,marginRight:'auto'}}>⚠ חריגת שעות</span>
                  )}
                </div>

                {/* Gantt bar: planned track + elapsed fill + overrun/saving extension + milestones */}
                {!isPending&&(
                  <div style={{position:'relative',height:24,marginBottom:4}}>
                    {(()=>{
                      const totalBarDays = hasDoneOverrun ? elapsedDays
                                         : hasDoneSaving  ? plannedDays
                                         : isOverdue      ? elapsedDays
                                         : actualDays;
                      const actualWidthPct  = Math.round(actualDays / totalBarDays * 100);
                      const plannedWidthPct = Math.round(plannedDays / totalBarDays * 100);
                      const overrunWidthPct = 100 - plannedWidthPct;
                      const savingWidthPct  = 100 - actualWidthPct;
                      return (<>
                        {/* Actual done zone (rightmost, full width or actual portion) */}
                        <div style={{
                          position:'absolute', right:0, top:0,
                          width:`${hasDoneSaving ? actualWidthPct : (isOverdue||hasDoneOverrun) ? plannedWidthPct : 100}%`,
                          height:'100%',
                          background: isDone ? '#D1FAE5' : isActive ? '#DBEAFE' : '#F3F4F6',
                          borderRadius: (hasDoneSaving||isOverdue||hasDoneOverrun) ? '5px 0 0 5px' : 5,
                          border:`1.5px solid ${isDone?'#A7F3D0':isActive?'#93C5FD':'#E5E7EB'}`,
                          borderLeft:'none',
                          overflow:'hidden',
                        }}>
                          {/* Elapsed fill */}
                          <div style={{
                            height:'100%', width:`${elapsedPct}%`,
                            background: isDone?'#059669': isActive&&isOverdue?'#EF4444':'#2563EB',
                            opacity: isDone?0.4:0.35,
                          }}/>
                          {/* Actual day label */}
                          <span style={{position:'absolute',right:6,top:'50%',transform:'translateY(-50%)',
                            fontSize:9,fontWeight:700,color:isDone?'#059669':'#2563EB',opacity:.9}}>
                            {actualDays}י׳
                          </span>
                        </div>
                        {/* Saving zone (left of actual, lighter green) */}
                        {hasDoneSaving&&(
                          <div style={{
                            position:'absolute', left:0, top:0,
                            width:`${savingWidthPct}%`, height:'100%',
                            background:'rgba(16,185,129,0.12)',
                            border:'1.5px solid rgba(16,185,129,0.35)',
                            borderRight:'none',
                            borderRadius:'0 5px 5px 0',
                            display:'flex', alignItems:'center', justifyContent:'center',
                          }}>
                            <span style={{fontSize:9,fontWeight:800,color:'#059669'}}>
                              -{doneSavingDays}י׳
                            </span>
                          </div>
                        )}
                        {/* Overrun zone (solid red, semi-transparent) */}
                        {(isOverdue||hasDoneOverrun)&&(
                          <div style={{
                            position:'absolute', left:0, top:0,
                            width:`${overrunWidthPct}%`, height:'100%',
                            background:'rgba(220,38,38,0.18)',
                            border:'1.5px solid rgba(220,38,38,0.4)',
                            borderRight:'none',
                            borderRadius:'0 5px 5px 0',
                          }}>
                            <span style={{position:'absolute',left:4,top:'50%',transform:'translateY(-50%)',
                              fontSize:9,fontWeight:700,color:'#DC2626'}}>
                              +{isDone?doneOverrunDays:elapsedDays-plannedDays}י׳
                            </span>
                          </div>
                        )}
                        {/* Today marker (active, not overdue) */}
                        {isActive&&!isOverdue&&days&&(
                          <div style={{
                            position:'absolute',
                            right:`${100-elapsedPct}%`, top:-3,
                            width:2, height:30, background:'#F97316', borderRadius:1, zIndex:2,
                          }}>
                            <span style={{position:'absolute',top:-14,right:-14,fontSize:8,fontWeight:700,color:'#F97316',whiteSpace:'nowrap'}}>היום</span>
                          </div>
                        )}
                        {/* ── Milestone icons ── */}
                        {showMilestones && ph.startDate && ph.endDate && (()=>{
                          const msBarWidthPct = hasDoneSaving
                            ? Math.round(actualDays / totalBarDays * 100)
                            : 100;
                          const phStart = new Date(ph.startDate).getTime();
                          const phEnd   = new Date(ph.endDate).getTime();
                          const phRange = phEnd - phStart;
                          const phaseMilestones = projectMilestones.filter(m => m.date >= ph.startDate && m.date <= ph.endDate);
                          return phaseMilestones.map(m => {
                            const f = phRange > 0 ? Math.max(0.01, Math.min(0.97, (new Date(m.date).getTime() - phStart) / phRange)) : 0;
                            const rightPct = f * msBarWidthPct;
                            const isHov = hoveredMilestone === m.id;
                            return (
                              <div key={m.id}
                                style={{position:'absolute', right:`calc(${rightPct}% - 5px)`, top:'50%', transform:'translateY(-50%)', zIndex:30, cursor:'default'}}
                                onMouseEnter={()=>setHoveredMilestone(m.id)}
                                onMouseLeave={()=>setHoveredMilestone(null)}
                              >
                                {/* Diamond */}
                                <div style={{
                                  width:10, height:10,
                                  background: isHov ? '#4338CA' : '#6366F1',
                                  transform:'rotate(45deg)',
                                  border:'1.5px solid #fff',
                                  boxShadow:'0 1px 4px rgba(0,0,0,.28)',
                                  flexShrink:0,
                                }}/>
                                {/* Tooltip */}
                                {isHov&&(
                                  <div style={{
                                    position:'absolute', bottom:'calc(100% + 10px)',
                                    right:'-70px',
                                    background:'#1E1F21', color:'#fff',
                                    padding:'6px 10px', borderRadius:7,
                                    fontSize:11, fontWeight:600,
                                    whiteSpace:'nowrap',
                                    boxShadow:'0 4px 16px rgba(0,0,0,.3)',
                                    pointerEvents:'none', zIndex:200,
                                    lineHeight:1.4,
                                  }}>
                                    {m.title}
                                    <div style={{color:'#9CA3AF',fontSize:10,marginTop:2,fontWeight:400}}>
                                      {m.date.split('-').reverse().join('.')}
                                    </div>
                                    <div style={{
                                      position:'absolute', bottom:-4, right:73,
                                      width:8, height:8, background:'#1E1F21',
                                      transform:'rotate(45deg)',
                                    }}/>
                                  </div>
                                )}
                              </div>
                            );
                          });
                        })()}
                      </>);
                    })()}
                  </div>
                )}
                {isPending&&(
                  <div style={{height:24,background:'repeating-linear-gradient(90deg,#F3F4F6 0,#F3F4F6 8px,#E5E7EB 8px,#E5E7EB 16px)',
                    borderRadius:5,border:'1.5px dashed #D1D5DB'}}/>
                )}

                {/* Dates row */}
                {(isDone||isActive)&&ph.startDate&&ph.endDate&&(
                  <div style={{display:'flex',justifyContent:'space-between',marginTop:3}}>
                    <span style={{fontSize:9,color:'var(--text-3)'}}>{ph.startDate.split('-').reverse().join('.')}</span>
                    <span style={{fontSize:9,color:isOverdue?'#DC2626':'var(--text-3)',fontWeight:isOverdue?700:400}}>{ph.endDate.split('-').reverse().join('.')}</span>
                  </div>
                )}
                {ph.note&&<div style={{marginTop:4,fontSize:10,color:'var(--text-3)'}}>{ph.note}</div>}
                {ph.blocker&&(
                  <div style={{marginTop:4,fontSize:10,color:'#DC2626',background:'#FEF2F2',padding:'3px 8px',borderRadius:4}}>⚠ {ph.blocker}</div>
                )}
              </div>
            );
          })}
          <div style={{display:'flex',gap:16,marginTop:6,paddingTop:10,borderTop:'1px solid var(--border)',flexWrap:'wrap'}}>
            <span style={{fontSize:11,color:'var(--text-3)'}}>מנהל: <strong style={{color:'var(--text)'}}>{p.pm}</strong></span>
            <span style={{fontSize:11,color:'var(--text-3)'}}>תקציב: <strong style={{color:'var(--text)'}}>{p.budget}</strong></span>
          </div>
        </div>
      )}

      {/* ── Hours balance tab ── */}
      {tab==='hours'&&(
        <div style={{padding:'14px 18px 10px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <span style={{fontSize:10,fontWeight:700,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:.4}}>שעות עובדי משרד</span>
            <span style={{fontSize:10,color:'var(--text-3)'}}>* נתוני הדגמה — יעודכן מדיווח שעות</span>
          </div>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
            <thead>
              <tr style={{borderBottom:'1px solid var(--border)'}}>
                {['מסלול','תוקצב','בוצע','נותר','%'].map(h=>(
                  <th key={h} style={{padding:'4px 8px',textAlign:'right',fontWeight:700,color:'var(--text-3)',fontSize:10}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {DISC_ORDER.filter(d=>p.hours[d]?.budget>0||p.hours[d]?.actual>0).map(d=>{
                const h=p.hours[d]; const st=hoursStatus(h.budget,h.actual);
                const cfg=HOURS_STATUS_CFG[st];
                const pct=h.budget>0?Math.round(h.actual/h.budget*100):0;
                const rem=Math.max(h.budget-h.actual,0);
                return (
                  <tr key={d} style={{borderBottom:'1px solid var(--border)',background:st==='overrun'?'#FFF5F5':st==='warning'?'#FFFDF0':''}}>
                    <td style={{padding:'6px 8px'}}>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <span style={{width:8,height:8,borderRadius:2,background:DISC_COLORS[d],display:'inline-block',flexShrink:0}}/>
                        <span style={{fontWeight:600,color:'var(--text)'}}>{DISC_LABELS[d]}</span>
                      </div>
                    </td>
                    <td style={{padding:'6px 8px',color:'var(--text-2)'}}>{h.budget.toLocaleString()}</td>
                    <td style={{padding:'6px 8px',fontWeight:600,color:cfg.color}}>{h.actual.toLocaleString()}</td>
                    <td style={{padding:'6px 8px'}}>
                      {st==='overrun'
                        ?<span style={{color:'#DC2626',fontWeight:700}}>+{(h.actual-h.budget).toLocaleString()} ⚠</span>
                        :<span style={{color:'var(--text-3)'}}>{rem.toLocaleString()}</span>}
                    </td>
                    <td style={{padding:'6px 8px'}}>
                      <div style={{display:'flex',alignItems:'center',gap:5}}>
                        <div style={{width:44,height:4,borderRadius:2,background:'var(--border)',overflow:'hidden'}}>
                          <div style={{height:'100%',width:`${Math.min(pct,100)}%`,background:cfg.color}}/>
                        </div>
                        <span style={{fontSize:10,fontWeight:600,color:cfg.color}}>{pct}%</span>
                      </div>
                    </td>
                  </tr>
                );
              })}
              <tr style={{borderTop:'2px solid var(--border)',background:'var(--bg)'}}>
                <td style={{padding:'6px 8px',fontWeight:700,color:'var(--text)'}}>סה״כ</td>
                <td style={{padding:'6px 8px',fontWeight:700}}>{tot.budget.toLocaleString()}</td>
                <td style={{padding:'6px 8px',fontWeight:700,color:tot.overrun?'#DC2626':'var(--text)'}}>{tot.actual.toLocaleString()}</td>
                <td style={{padding:'6px 8px',fontWeight:700}}>
                  {tot.overrun
                    ?<span style={{color:'#DC2626'}}>+{(tot.actual-tot.budget).toLocaleString()} ⚠</span>
                    :<span style={{color:'var(--text-3)'}}>{(tot.budget-tot.actual).toLocaleString()}</span>}
                </td>
                <td style={{padding:'6px 8px',fontWeight:700,color:tot.overrun?'#DC2626':tot.pct>85?'#D97706':'#059669'}}>{tot.pct}%</td>
              </tr>
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function PortfolioView() {
  const [view, setView] = React.useState('cards');
  const [expandedId, setExpandedId] = React.useState(null);
  const [showFilter, setShowFilter] = React.useState(false);
  const filterRef = React.useRef(null);

  /* ── filter state ── */
  const [fTypes,     setFTypes]     = React.useState([]);
  const [fStages,    setFStages]    = React.useState([]);
  const [fPMs,       setFPMs]       = React.useState([]);
  const [fPrios,     setFPrios]     = React.useState([]);
  const [fTrackSt,   setFTrackSt]   = React.useState(''); // 'blocked' only for now
  const [fBlocked,   setFBlocked]   = React.useState(false);

  React.useEffect(()=>{
    if(!showFilter) return;
    const h=e=>{if(filterRef.current&&!filterRef.current.contains(e.target))setShowFilter(false);};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[showFilter]);

  /* ── derived options ── */
  const ALL_TYPES  = [...new Set(PORTFOLIO_DATA.map(p=>p.type))];
  const ALL_STAGES = [...new Set(PORTFOLIO_DATA.map(p=>p.stage))];
  const ALL_PMS    = [...new Set(PORTFOLIO_DATA.map(p=>p.pm))];
  const ALL_PRIOS  = [{id:'high',label:'גבוהה',color:'#EF4444'},{id:'medium',label:'בינונית',color:'#F59E0B'},{id:'low',label:'נמוכה',color:'#9CA3AF'}];

  const activePhase = p => p.phases.find(ph=>ph.status==='active') || p.phases[p.phases.length-1];

  const toggleArr=(arr,setArr,v)=>setArr(arr.includes(v)?arr.filter(x=>x!==v):[...arr,v]);
  const clearAll=()=>{setFTypes([]);setFStages([]);setFPMs([]);setFPrios([]);setFBlocked(false);};
  const hasFilters = fTypes.length||fStages.length||fPMs.length||fPrios.length||fBlocked;

  const filtered = PORTFOLIO_DATA.filter(p=>{
    if(fTypes.length   && !fTypes.includes(p.type))                 return false;
    if(fStages.length  && !fStages.includes(activePhase(p).id))     return false;
    if(fPMs.length     && !fPMs.includes(p.pm))                     return false;
    if(fPrios.length   && !fPrios.includes(p.priority))             return false;
    if(fBlocked        && p.blockers.length===0)                    return false;
    return true;
  });

  const totalBlockers = PORTFOLIO_DATA.reduce((s,p)=>s+p.blockers.length,0);
  const totalPeople = new Set(PORTFOLIO_DATA.flatMap(p=>[p.pm,...p.team])).size;

  const PriorityDot = ({priority}) => {
    const c = priority==='high'?'#EF4444':priority==='medium'?'#F59E0B':'#9CA3AF';

    <div style={{display:'flex',alignItems:'center',gap:0,marginTop:10}}>

        const days = phaseDays(ph);
        const isDone    = ph.status==='done';
        const isActive  = ph.status==='active';
        const isPending = ph.status==='pending';
        const dotColor  = isDone?'#059669':isActive?'#2563EB':'#D1D5DB';
        const labelColor= isDone?'#059669':isActive?'#2563EB':'#9CA3AF';
        return (
          <React.Fragment key={ph.id}>
            {i>0&&<div style={{flex:1,height:2,background:isDone||isActive?'#D1FAE5':'var(--border)',marginBottom:14}}/>}
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,minWidth:0}}>
              <div style={{width:20,height:20,borderRadius:'50%',border:`2px solid ${dotColor}`,
                background:isDone?dotColor:isActive?'#EFF6FF':'var(--bg)',
                display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                {isDone&&<span style={{fontSize:9,color:'#fff',fontWeight:900}}>✓</span>}
                {isActive&&<div style={{width:7,height:7,borderRadius:'50%',background:'#2563EB'}}/>}
              </div>
              <span style={{fontSize:9,fontWeight:isActive?700:500,color:labelColor,whiteSpace:'nowrap',maxWidth:60,textOverflow:'ellipsis',overflow:'hidden',textAlign:'center'}}>{ph.id}</span>
              {isActive&&days&&(
                <span style={{fontSize:9,color:days.overdue?'#DC2626':'#2563EB',fontWeight:600,whiteSpace:'nowrap'}}>
                  {days.overdue?`${Math.abs(days.remaining)}י׳ באיחור`:`${days.remaining}י׳ נותרו`}
                </span>
              )}
            </div>
          </React.Fragment>
        );
      })}
    </div>
  );

  return (
    <div style={{flex:1,overflow:'auto',background:'var(--bg)',padding:'24px 28px',display:'flex',flexDirection:'column',gap:20}}>

          <p style={{fontSize:12,color:'var(--text-3)',margin:'3px 0 0'}}>Knafo Klimor Architects · תצוגת ניהול</p>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>

          {/* ── Filter button + panel ── */}
          <div ref={filterRef} style={{position:'relative'}}>
            <button onClick={()=>setShowFilter(o=>!o)}

                border:`1px solid ${hasFilters?'var(--accent)':'var(--border)'}`,fontSize:12,fontWeight:600,
                cursor:'pointer',fontFamily:'inherit',
                background:hasFilters?'rgba(37,99,235,.07)':'var(--surface)',
                color:hasFilters?'var(--accent)':'var(--text-2)'}}>
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M2 4h12M5 8h6M7 12h2"/></svg>
              סינון
              {!!hasFilters&&<span style={{background:'var(--accent)',color:'#fff',borderRadius:'50%',width:16,height:16,fontSize:10,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>
                {[fTypes,fStages,fPMs,fPrios].reduce((s,a)=>s+a.length,0)+(fBlocked?1:0)}
              </span>}
            </button>

            {showFilter&&(
              <div onClick={e=>e.stopPropagation()}
                style={{position:'absolute',top:'calc(100% + 6px)',left:0,width:280,
                  background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,
                  boxShadow:'0 8px 28px rgba(0,0,0,.14)',zIndex:700,padding:'14px 16px',
                  display:'flex',flexDirection:'column',gap:14}}>

                {/* Type */}
                <div>
                  <div style={{fontSize:10,fontWeight:700,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:.5,marginBottom:6}}>סוג פרויקט</div>
                  <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                    {ALL_TYPES.map(t=>(
                      <button key={t} onClick={()=>toggleArr(fTypes,setFTypes,t)}
                        style={{padding:'3px 10px',borderRadius:6,border:'1px solid',fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'inherit',
                          background:fTypes.includes(t)?'var(--accent)':'var(--bg)',
                          color:fTypes.includes(t)?'#fff':'var(--text-2)',

                <div>

                  <div style={{display:'flex',gap:6}}>
                    {ALL_PRIOS.map(p=>(
                      <button key={p.id} onClick={()=>toggleArr(fPrios,setFPrios,p.id)}
                        style={{display:'flex',alignItems:'center',gap:5,padding:'3px 10px',borderRadius:6,border:'1px solid',fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'inherit',

                <div>
