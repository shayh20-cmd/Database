/* ══════════════════════════════════════
   Action label detector (for undo history)
══════════════════════════════════════ */
const detectActionLabel = (oldD, newD) => {
  if (!oldD) return 'עריכה';
  if (oldD.projectName !== newD.projectName) return 'שינוי שם: ' + newD.projectName;
  const oldSheets = oldD.sheets || [];
  const newSheets = newD.sheets || [];
  if (oldSheets.length < newSheets.length) return 'הוספת שלב';
  if (oldSheets.length > newSheets.length) return 'מחיקת שלב';
  for (const ns of newSheets) {
    const os = oldSheets.find(s => s.id === ns.id);
    if (!os) continue;
    if (os.name !== ns.name) return 'שינוי שם שלב: ' + ns.name;
    const ot = os.tasks || [];
    const nt = ns.tasks || [];
    if (nt.length > ot.length) return 'הוספת משימה';
    if (nt.length < ot.length) return 'מחיקת משימה';
    for (const t of nt) {
      const ov = ot.find(x => x.id === t.id);
      if (!ov) continue;
      if (ov.title !== t.title) return 'כותרת: ' + (t.title || '');
      if (ov.statusId !== t.statusId) return 'סטטוס: ' + (t.title || '');
      if (ov.done !== t.done) return (t.done ? '✓ ' : '○ ') + (t.title || '');
      if (JSON.stringify(ov.subtasks) !== JSON.stringify(t.subtasks)) return 'תת-משימות: ' + (t.title || '');
      if (JSON.stringify(ov.processEvents) !== JSON.stringify(t.processEvents)) return 'אירועים: ' + (t.title || '');
    }
    if (JSON.stringify(os.groups) !== JSON.stringify(ns.groups)) return 'עדכון קבוצות';
    if (JSON.stringify(os.fields) !== JSON.stringify(ns.fields)) return 'עדכון שדות';
  }
  if (JSON.stringify(oldD.licensingGoals) !== JSON.stringify(newD.licensingGoals)) return 'עדכון יעדים';
  if (JSON.stringify(oldD.licensingMilestones) !== JSON.stringify(newD.licensingMilestones)) return 'עדכון אבני דרך';
  return 'עריכה';
};

/* ══════════════════════════════════════
   UndoRedoBtn component
══════════════════════════════════════ */
const UndoRedoBtn = ({icon, tooltip, items, onApply, onGoTo, disabled}) => {
  const [open, setOpen] = React.useState(false);
  const [dropPos, setDropPos] = React.useState({top:0,left:0});
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!open) return;
    const handler = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);
  const hasItems = items.length > 0;
  const toggleDropdown = () => {
    if (!hasItems) return;
    if (!open && ref.current) {
      const r = ref.current.getBoundingClientRect();
      setDropPos({top: r.bottom + 6, left: r.left});
    }
    setOpen(o => !o);
  };
  return (
    <div ref={ref} style={{position:'relative',display:'inline-flex',alignItems:'center'}}>
      <div style={{display:'flex',border:'1px solid var(--border)',borderRadius:6,overflow:'hidden',
        opacity:disabled?0.4:1,transition:'opacity .15s'}}>
        <button onClick={onApply} disabled={disabled} title={tooltip}
          style={{padding:'3px 8px',fontSize:14,lineHeight:'1',background:'var(--surface)',border:'none',
            cursor:disabled?'default':'pointer',color:'var(--text)',transition:'background .15s',fontFamily:'inherit'}}
          onMouseEnter={e=>{if(!disabled)e.currentTarget.style.background='var(--hover)'}}
          onMouseLeave={e=>e.currentTarget.style.background='var(--surface)'}>
          {icon}
        </button>
        <button onClick={toggleDropdown} disabled={!hasItems} title="היסטוריה"
          style={{padding:'3px 5px',fontSize:9,lineHeight:'1',background:'var(--surface)',border:'none',
            borderLeft:'1px solid var(--border)',cursor:hasItems?'pointer':'default',
            color:'var(--text-2)',transition:'background .15s'}}
          onMouseEnter={e=>{if(hasItems)e.currentTarget.style.background='var(--hover)'}}
          onMouseLeave={e=>e.currentTarget.style.background='var(--surface)'}>
          ▾
        </button>
      </div>
      {open && hasItems && ReactDOM.createPortal(
        <div style={{position:'fixed',top:dropPos.top,left:dropPos.left,minWidth:210,
          background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,
          boxShadow:'0 6px 24px rgba(0,0,0,.16)',zIndex:9999,overflow:'hidden',direction:'rtl'}}>
          <div style={{padding:'6px 12px 5px',fontSize:10,fontWeight:700,color:'var(--text-3)',
            textTransform:'uppercase',letterSpacing:.5,borderBottom:'1px solid var(--border)',
            textAlign:'right'}}>
            {tooltip}
          </div>
          {items.slice().reverse().map((item, idx) => (
            <div key={idx}
              onClick={()=>{onGoTo(items.length - idx);setOpen(false);}}
              style={{padding:'7px 14px',fontSize:12,cursor:'pointer',color:'var(--text)',
                display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,
                background:idx===0?'rgba(99,102,241,.07)':'transparent',transition:'background .12s'}}
              onMouseEnter={e=>e.currentTarget.style.background='var(--hover)'}
              onMouseLeave={e=>e.currentTarget.style.background=idx===0?'rgba(99,102,241,.07)':'transparent'}>
              <span style={{color:'var(--text-3)',fontSize:10,fontVariantNumeric:'tabular-nums',
                minWidth:16,textAlign:'left',flexShrink:0}}>{idx+1}</span>
              <span style={{flex:1,textAlign:'right'}}>{item.label}</span>
            </div>
          ))}
        </div>,
        document.body
      )}
    </div>
  );
};

/* ══════════════════════════════════════
   Template View — track/stage hierarchy editor
══════════════════════════════════════ */
function TemplateView({data, save}) {
  const [activeTab, setActiveTab] = useState('work'); // 'general' | 'work'
  const tracks = data.tracks || [];
  const sheets = data.sheets || [];

  const [editingTrackId, setEditingTrackId] = useState(null);
  const [trackNameDraft, setTrackNameDraft] = useState('');
  const [editingStageId, setEditingStageId] = useState(null);
  const [stageNameDraft, setStageNameDraft] = useState('');
  const [addingTrack, setAddingTrack] = useState(false);
  const [newTrackDraft, setNewTrackDraft] = useState('');
  const [dragStage, setDragStage] = useState(null); // {trackId, sheetId}

  const renameTrack = (trackId, label) => {
    if (!label.trim()) { setEditingTrackId(null); return; }
    save({...data, tracks: tracks.map(t => t.id===trackId ? {...t, label:label.trim()} : t)});
    setEditingTrackId(null);
  };
  const deleteTrack = (track) => {
    if (track.stageOrder.length) return;
    save({...data, tracks: tracks.filter(t => t.id!==track.id)});
  };
  const addTrack = (label) => {
    if (!label.trim()) { setAddingTrack(false); return; }
    const id = uid();
    save({...data, tracks: [...tracks, {id, label:label.trim(), trackValue:id, stageOrder:[]}]});
    setAddingTrack(false); setNewTrackDraft('');
  };
  const addStage = (track) => {
    const ns = {...makeEmptySheet('שלב חדש'), track: track.trackValue};
    save({
      ...data,
      sheets: [...sheets, ns],
      tracks: tracks.map(t => t.id===track.id ? {...t, stageOrder:[...t.stageOrder, ns.id]} : t),
    });
  };
  const deleteStage = (track, sheetId) => {
    const sheet = sheets.find(s => s.id===sheetId);
    if (!window.confirm(`למחוק את השלב "${sheet?.name||''}"? כל המשימות בו יימחקו לצמיתות.`)) return;
    save({
      ...data,
      sheets: sheets.filter(s => s.id!==sheetId),
      tracks: tracks.map(t => t.id===track.id ? {...t, stageOrder:t.stageOrder.filter(id=>id!==sheetId)} : t),
    });
  };
  const renameStage = (sheetId, name) => {
    if (!name.trim()) { setEditingStageId(null); return; }
    save({...data, sheets: sheets.map(s => s.id===sheetId ? {...s, name:name.trim()} : s)});
    setEditingStageId(null);
  };
  const reorderStage = (track, srcId, tgtId) => {
    if (srcId===tgtId) return;
    const order = [...track.stageOrder];
    const si = order.indexOf(srcId), ti = order.indexOf(tgtId);
    if (si===-1 || ti===-1) return;
    order.splice(si,1); order.splice(ti,0,srcId);
    save({...data, tracks: tracks.map(t => t.id===track.id ? {...t, stageOrder:order} : t)});
  };

  return (
    <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden'}}>
      <div style={{display:'flex', borderBottom:'1px solid var(--border)', background:'var(--surface)', flexShrink:0}}>
        {[{id:'general', label:'כללי'}, {id:'work', label:'סכימת עבודה'}].map(t => (
          <button key={t.id} onClick={() => setActiveTab(t.id)}
            style={{padding:'9px 16px', fontSize:12, fontFamily:'inherit', border:'none', cursor:'pointer',
              background:'none', borderBottom:'2px solid',
              borderBottomColor: activeTab===t.id ? 'var(--accent)' : 'transparent',
              fontWeight: activeTab===t.id ? 700 : 400,
              color: activeTab===t.id ? 'var(--text)' : 'var(--text-2)'}}>
            {t.label}
          </button>
        ))}
      </div>
      <div style={{flex:1, overflow:'auto', background:'var(--bg)'}}>
        {activeTab==='general' && <div style={{padding:24, color:'var(--text-3)', fontSize:13}}>—</div>}
        {activeTab==='work' && (
          <div style={{padding:'32px 24px', display:'flex', flexDirection:'column', alignItems:'center', gap:0}}>
            <div style={{background:'var(--accent)', color:'#fff', padding:'7px 16px', borderRadius:8, fontSize:12.5, fontWeight:700}}>
              ניהול תכנון
            </div>
            <div style={{width:1, height:14, background:'var(--border-strong)'}}/>
            <div style={{display:'flex', gap:16, flexWrap:'wrap', justifyContent:'center'}}>
              {tracks.map(track => (
                <div key={track.id} style={{background:'#eef2ff', border:'1.5px solid #c7d2fe', borderRadius:10, padding:10,
                  display:'flex', flexDirection:'column', gap:6, minWidth:160}}>
                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', gap:6}}>
                    {editingTrackId===track.id
                      ? <input autoFocus value={trackNameDraft}
                          onChange={e=>setTrackNameDraft(e.target.value)}
                          onBlur={()=>renameTrack(track.id, trackNameDraft)}
                          onKeyDown={e=>{if(e.key==='Enter')e.target.blur();if(e.key==='Escape')setEditingTrackId(null);}}
                          style={{fontWeight:700, fontSize:12.5, border:'none', borderBottom:'1.5px solid var(--accent)',
                            outline:'none', background:'transparent', fontFamily:'inherit', color:'#1e3a8a', flex:1, minWidth:60}}/>
                      : <span onClick={()=>{setTrackNameDraft(track.label);setEditingTrackId(track.id);}}
                          style={{fontWeight:700, fontSize:12.5, color:'#1e3a8a', cursor:'text'}}>
                          {track.label}
                        </span>}
                    <button onClick={()=>deleteTrack(track)} disabled={track.stageOrder.length>0}
                      title={track.stageOrder.length>0 ? 'יש להעביר או למחוק את השלבים לפני מחיקת המסלול' : 'מחק מסלול'}
                      style={{background:'none', border:'none', cursor:track.stageOrder.length>0?'default':'pointer',
                        color: track.stageOrder.length>0 ? 'var(--border-strong)' : '#94a3b8', fontSize:13, padding:0}}>
                      ✕
                    </button>
                  </div>
                  {track.stageOrder.map(sheetId => {
                    const sheet = sheets.find(s => s.id===sheetId);
                    if (!sheet) return null;
                    return (
                      <div key={sheetId} draggable
                        onDragStart={()=>setDragStage({trackId:track.id, sheetId})}
                        onDragOver={e=>{if(dragStage && dragStage.trackId===track.id) e.preventDefault();}}
                        onDrop={e=>{e.preventDefault(); if(dragStage && dragStage.trackId===track.id) reorderStage(track, dragStage.sheetId, sheetId); setDragStage(null);}}
                        onDragEnd={()=>setDragStage(null)}
                        style={{background:'#fff', border:'1px solid #dbe3f5', borderRadius:6, padding:'5px 8px',
                          fontSize:10.5, display:'flex', justifyContent:'space-between', alignItems:'center', gap:6, cursor:'grab'}}>
                        {editingStageId===sheetId
                          ? <input autoFocus value={stageNameDraft}
                              onChange={e=>setStageNameDraft(e.target.value)}
                              onBlur={()=>renameStage(sheetId, stageNameDraft)}
                              onKeyDown={e=>{if(e.key==='Enter')e.target.blur();if(e.key==='Escape')setEditingStageId(null);}}
                              style={{fontSize:10.5, border:'none', borderBottom:'1.5px solid var(--accent)',
                                outline:'none', background:'transparent', fontFamily:'inherit', flex:1, minWidth:50}}/>
                          : <span onClick={()=>{setStageNameDraft(sheet.name);setEditingStageId(sheetId);}} style={{cursor:'text'}}>
                              {sheet.name}
                            </span>}
                        <button onClick={()=>deleteStage(track, sheetId)}
                          style={{background:'none', border:'none', cursor:'pointer', color:'#cbd5e1', fontSize:11, padding:0}}>
                          ✕
                        </button>
                      </div>
                    );
                  })}
                  <div onClick={()=>addStage(track)} style={{color:'#6b85c4', fontSize:10, padding:3, cursor:'pointer'}}>
                    + הוסף שלב
                  </div>
                </div>
              ))}
              {addingTrack
                ? <input autoFocus value={newTrackDraft}
                    onChange={e=>setNewTrackDraft(e.target.value)}
                    onBlur={()=>addTrack(newTrackDraft)}
                    onKeyDown={e=>{if(e.key==='Enter')e.target.blur();if(e.key==='Escape'){setAddingTrack(false);setNewTrackDraft('');}}}
                    placeholder="שם המסלול"
                    style={{minWidth:90, border:'1.5px dashed #c7d2fe', borderRadius:10, padding:'10px 12px',
                      fontSize:12, fontFamily:'inherit', outline:'none', background:'#fff'}}/>
                : <div onClick={()=>setAddingTrack(true)}
                    style={{minWidth:90, border:'1.5px dashed #c7d2fe', borderRadius:10, display:'flex',
                      alignItems:'center', justifyContent:'center', color:'#94a3b8', fontSize:11, cursor:'pointer'}}>
                    + מסלול
                  </div>}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   App Root
══════════════════════════════════════ */
function App() {
  const [data,setData]=useState(loadData);
  const [editName,setEditName]=useState(false);
  const [nameDraft,setNameDraft]=useState(data.projectName);
  const [editingSheetId,setEditingSheetId]=useState(null);
  const [sheetNameDraft,setSheetNameDraft]=useState('');

  const sheets = data.sheets||[];
  const [activeSheetId,setActiveSheetId]=useState(()=>sheets[0]?.id||'');
  const activeSheet = sheets.find(s=>s.id===activeSheetId)||sheets[0]||null;

  const MAX_HIST = 30;
  const [pastStack, setPastStack] = useState([]);   // [{snapshot, label}]
  const [futureStack, setFutureStack] = useState([]); // [{snapshot, label}]

  const save=useCallback(nd=>{
    const d={...nd,_ts:Date.now()};
    const label=detectActionLabel(data,nd);
    setPastStack(p=>[...p.slice(-(MAX_HIST-1)),{snapshot:{...data},label}]);
    setFutureStack([]);
    setData(d);localStorage.setItem(STORAGE_KEY,JSON.stringify(d));
  },[data]);

  /* Save updates that originate from a list-sheet's toolbar/actions */
  const saveActiveSheet=useCallback(nd=>{
    const updatedSheets=(data.sheets||[]).map(s=>s.id===activeSheetId?{
      ...s,
      groups:nd.groups!==undefined?nd.groups:s.groups,
      tasks:nd.tasks!==undefined?nd.tasks:s.tasks,
      fields:nd.fields!==undefined?nd.fields:s.fields,
      hiddenCols:nd.hiddenCols!==undefined?nd.hiddenCols:s.hiddenCols,
      colOrder:nd.colOrder!==undefined?nd.colOrder:s.colOrder,
    }:s);
    save({...nd, sheets:updatedSheets});
  },[data,activeSheetId,save]);

  const undoTo = useCallback((steps) => {
    const n = Math.min(steps, pastStack.length);
    if (!n) return;
    const newPast = pastStack.slice(0, pastStack.length - n);
    const displaced = pastStack.slice(pastStack.length - n); // oldest→newest
    const futureEntries = [
      {snapshot:{...data}, label:displaced[displaced.length-1].label},
      ...displaced.slice(0,-1).reverse().map((p,i,arr)=>({
        snapshot: arr[i+1]?.snapshot ?? displaced[displaced.length-1].snapshot,
        label: p.label
      }))
    ];
    const restored = {...displaced[0].snapshot, _ts:Date.now()};
    setPastStack(newPast);
    setFutureStack(fut=>[...futureEntries,...fut].slice(0,MAX_HIST));
    setData(restored);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(restored));
  }, [data, pastStack]);

  const redoTo = useCallback((steps) => {
    const n = Math.min(steps, futureStack.length);
    if (!n) return;
    const displaced = futureStack.slice(0, n);
    const newFuture = futureStack.slice(n);
    const pastEntries = [
      {snapshot:{...data}, label:displaced[0].label},
      ...displaced.slice(1).map((f,i)=>({snapshot:displaced[i].snapshot, label:f.label}))
    ];
    const restored = {...displaced[n-1].snapshot, _ts:Date.now()};
    setPastStack(p=>[...p.slice(-(MAX_HIST-n)),...pastEntries]);
    setFutureStack(newFuture);
    setData(restored);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(restored));
  }, [data, futureStack]);

  React.useEffect(()=>{
    const handler = e => {
      if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.key==='z'){e.preventDefault();undoTo(1);}
      if((e.ctrlKey||e.metaKey)&&((e.shiftKey&&e.key==='z')||e.key==='y')){e.preventDefault();redoTo(1);}
    };
    document.addEventListener('keydown',handler);
    return ()=>document.removeEventListener('keydown',handler);
  },[undoTo,redoTo]);

  const commitName=()=>{if(nameDraft.trim())save({...data,projectName:nameDraft.trim()});setEditName(false);};

  const commitSheetName=()=>{
    if(sheetNameDraft.trim()){
      const updatedSheets=sheets.map(s=>s.id===editingSheetId?{...s,name:sheetNameDraft.trim()}:s);
      save({...data,sheets:updatedSheets});
    }
    setEditingSheetId(null);
  };

  const addSheet=()=>{
    const ns={...makeEmptySheet('שלב חדש'), track:'licensing'};
    const updatedSheets=[...sheets,ns];
    save({...data,sheets:updatedSheets});
    setActiveSheetId(ns.id);
  };

  /* top-level track: 'overview' | 'licensing' | future tracks */
  const [track, setTrack] = useState('licensing');

  const setTrackWithSheet = React.useCallback((newTrack) => {
    setTrack(newTrack);
    if(newTrack==='licensing') {
      const dashboard = sheets.find(s=>s.type==='dashboard');
      if(dashboard) setActiveSheetId(dashboard.id);
    }
  }, [sheets]);

  /* Merge active sheet's list data into a "data-like" object for ListViewWithCtx */
  const sheetData = activeSheet?.type==='list' ? {
    ...data,
    groups:activeSheet.groups||[],
    tasks:activeSheet.tasks||[],
    fields:activeSheet.fields||[],
    hiddenCols:activeSheet.hiddenCols||{},
    colOrder:activeSheet.colOrder||[],
    sheetName:activeSheet.name||'',
  } : data;

  const SheetTab = ({s}) => editingSheetId===s.id
    ? <input autoFocus value={sheetNameDraft}
        onChange={e=>setSheetNameDraft(e.target.value)}
        onBlur={commitSheetName}
        onKeyDown={e=>{if(e.key==='Enter')commitSheetName();if(e.key==='Escape')setEditingSheetId(null);}}
        style={{border:'1.5px solid var(--accent)',borderRadius:5,padding:'2px 8px',alignSelf:'center',
          fontSize:12,fontFamily:'inherit',outline:'none',background:'var(--surface)',
          color:'var(--text)',minWidth:60,maxWidth:130}}/>
    : <button className={`stab${s.id===activeSheetId?' active':''}`}
        onClick={()=>setActiveSheetId(s.id)}
        onDoubleClick={()=>{setSheetNameDraft(s.name);setEditingSheetId(s.id);}}>
        {s.type==='dashboard'?<><Ic n="overview"/> </>:''}{s.name}
      </button>;

  return(
    <div className="shell">
    <Sidebar track={track} setTrack={setTrackWithSheet}/>
    <div className="app">
      {/* ── Project Header ── */}
      <div className="proj-header">
        <div className="proj-top">
          <div className="proj-icon"><Ic n="building" size={15}/></div>
          {editName
            ?<input className="proj-name-input" autoFocus value={nameDraft}
                onChange={e=>setNameDraft(e.target.value)}
                onBlur={commitName}
                onKeyDown={e=>{if(e.key==='Enter')commitName();if(e.key==='Escape')setEditName(false);}}/>
            :<span className="proj-name" onClick={()=>{setNameDraft(data.projectName);setEditName(true);}}>
                {data.projectName}
              </span>
          }
          <button className="icon-btn" title="מועדפים"><Ic n="star"/></button>
          <div className="hdr-right">
            <div className="avatar-stack">
              {[['#2563EB','YS'],['#7C3AED','U'],['#059669','A']].map(([bg,l],i)=>(
                <div key={i} className="av" style={{background:bg}}>{l}</div>
              ))}
            </div>
            <button className="btn-share"><Ic n="share"/> שתף</button>
          </div>
        </div>

        {/* ── track breadcrumb + sheet sub-tabs ── */}
        <div className="sheet-tabs" style={{borderTop:'1px solid var(--border)'}}>
          {/* current track label */}
          <span style={{fontSize:11,fontWeight:600,color:'var(--text-3)',paddingLeft:4,paddingRight:8,
            display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
            <Ic n={PROJ_TRACKS.find(t=>t.id===track)?.icon||'overview'} size={12}/>
            {PROJ_TRACKS.find(t=>t.id===track)?.label||''}
          </span>
          {/* divider + sub-tabs for licensing — dashboard sheet always shown, list sheets filtered by track */}
          {track==='licensing' && <span style={{color:'var(--border-strong)',marginLeft:4,marginRight:4}}>›</span>}
          {track==='licensing' && sheets.filter(s=>s.type==='dashboard' || s.track==='licensing').map(s=><SheetTab key={s.id} s={s}/>)}
          {track==='licensing' && <button className="stab-add" title="הוסף שלב" onClick={addSheet}>+</button>}
          {/* ── Undo / Redo ── */}
          <div style={{marginRight:'auto',display:'flex',alignItems:'center',gap:4,paddingLeft:10,flexShrink:0}}>
            <UndoRedoBtn icon="↩" tooltip="ביטול" items={pastStack} disabled={!pastStack.length}
              onApply={()=>undoTo(1)} onGoTo={undoTo}/>
            <UndoRedoBtn icon="↪" tooltip="שחזור" items={futureStack} disabled={!futureStack.length}
              onApply={()=>redoTo(1)} onGoTo={redoTo}/>
          </div>
        </div>
      </div>

      {/* ── Content ── */}
      <div style={{display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}}>
        {track==='overview' && <OverviewPage data={data} save={save}/>}
        {track==='tasks'    && <NihulTikhnunView data={data} save={save}/>}
        {track==='licensing' && activeSheet?.type==='dashboard' && <DashboardView data={data} save={save} onSwitchSheet={setActiveSheetId}/>}
        {track==='licensing' && activeSheet?.type==='list' && <ListViewWithCtx data={sheetData} save={saveActiveSheet}/>}
        {track==='meetings'    && <ComingSoonPage iconName="meetings"    title="ישיבות" desc="ריכוז וניהול סיכומי ישיבות — בפיתוח"/>}
        {track==='supervision' && <ComingSoonPage iconName="supervision" title="פיקוח"  desc="ריכוז וניהול דוחות פיקוח מהביצוע — בפיתוח"/>}
        {track==='mytasks'     && <MyTasksView data={data} save={save}/>}
        {track==='portfolio'   && <PortfolioView/>}
        {track==='template'    && <TemplateView data={data} save={save}/>}
      </div>
    </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
