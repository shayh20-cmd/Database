function TaskDetailSidebar({task, onUpdate, onClose, data}) {
  const {priorities, disciplines} = useContext(ListsCtx);
  const groups    = data.groups || [];
  const group     = groups.find(g => g.id===task.groupId);
  const sheetName = data.sheetName || '';

  /* Tabs */
  const [activeTab, setActiveTab] = useState('desc');

  /* Description rich-text editor */
  const descRef = useRef(null);
  useEffect(()=>{ if(descRef.current) descRef.current.innerHTML = task.description||''; },[task.id]);
  const saveDesc = () => {
    const html = descRef.current?.innerHTML||'';
    if(html !== (task.description||'')) onUpdate({...task, description:html});
  };
  const execFmt = cmd => { descRef.current?.focus(); document.execCommand(cmd,false,null); };

  /* Image handling */
  const [imgSel, setImgSel]         = useState(null); // {el, rect}
  const [annMode, setAnnMode]       = useState(null); // 'draw'|'highlight'|'text'|null
  const [annColor, setAnnColor]     = useState('#ef4444');
  const [annHlColor, setAnnHlColor] = useState('#fde68a');
  const [annSize, setAnnSize]       = useState(3);
  const annCanvasRef = useRef(null);
  const annDrawing   = useRef(false);
  const annLast      = useRef(null);

  const fitImg = img => { img.style.maxWidth='100%'; img.style.width='100%'; img.style.height='auto'; };

  /* wrap img in resize container */
  const wrapImg = img => {
    if(img.parentElement?.classList.contains('tds-img-wrap')) return img.parentElement;
    const wrap = document.createElement('div');
    wrap.className = 'tds-img-wrap';
    wrap.style.width = img.style.width || img.offsetWidth+'px';
    img.parentNode.insertBefore(wrap, img);
    wrap.appendChild(img);
    img.style.width = '100%';
    img.style.maxWidth = '100%';
    img.style.height = 'auto';
    return wrap;
  };

  /* resize handle drag */
  const startResize = (e, corner, wrap) => {
    e.preventDefault(); e.stopPropagation();
    const startX = e.clientX;
    const startW = wrap.offsetWidth;
    const onMove = mv => {
      let dx = startX - mv.clientX; // RTL: drag right = smaller
      if(corner==='ne'||corner==='se'||corner==='e') dx = mv.clientX - startX;
      const maxW = descRef.current?.offsetWidth || 400;
      wrap.style.width = Math.max(60, Math.min(maxW, startW + dx)) + 'px';
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      saveDesc();
      setImgSel(s => s ? {...s, rect: s.el.getBoundingClientRect()} : s);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  };

  const insertImg = () => {
    const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
    inp.onchange=e=>{
      const f=e.target.files[0]; if(!f) return;
      const r=new FileReader(); r.onload=()=>{
        descRef.current?.focus();
        document.execCommand('insertImage',false,r.result);
        const imgs=descRef.current?.querySelectorAll('img:not(.tds-img-wrap img)');
        if(imgs?.length){ const img=imgs[imgs.length-1]; fitImg(img); wrapImg(img); }
        saveDesc();
      }; r.readAsDataURL(f);
    }; inp.click();
  };
  const onPaste = e => {
    for(const item of (e.clipboardData?.items||[])){
      if(item.type.startsWith('image/')){
        e.preventDefault();
        const r=new FileReader(); r.onload=()=>{
          document.execCommand('insertImage',false,r.result);
          const imgs=descRef.current?.querySelectorAll('img:not(.tds-img-wrap img)');
          if(imgs?.length){ const img=imgs[imgs.length-1]; fitImg(img); wrapImg(img); }
          saveDesc();
        }; r.readAsDataURL(item.getAsFile()); break;
      }
    }
  };

  const selectImg = img => {
    descRef.current?.querySelectorAll('img.tds-img-sel').forEach(i=>i.classList.remove('tds-img-sel'));
    img.classList.add('tds-img-sel');
    wrapImg(img);
    setImgSel({el:img, rect:img.getBoundingClientRect()});
    setAnnMode(null);
  };
  const deselectImg = () => {
    descRef.current?.querySelectorAll('img.tds-img-sel').forEach(i=>i.classList.remove('tds-img-sel'));
    setImgSel(null); setAnnMode(null);
  };

  const handleEditorClick = e => {
    if(e.target.tagName==='IMG') selectImg(e.target);
    else if(!e.target.closest('.tds-img-wrap')) deselectImg();
  };

  /* annotation canvas drawing */
  useEffect(()=>{
    if(annMode!=='draw'&&annMode!=='highlight') return;
    const canvas = annCanvasRef.current; if(!canvas) return;
    const onDown = e => {
      annDrawing.current=true;
      const r=canvas.getBoundingClientRect();
      annLast.current={x:e.clientX-r.left,y:e.clientY-r.top};
    };
    const onMove = e => {
      if(!annDrawing.current||!annLast.current) return;
      const r=canvas.getBoundingClientRect();
      const x=e.clientX-r.left, y=e.clientY-r.top;
      const ctx=canvas.getContext('2d');
      ctx.strokeStyle = annMode==='highlight' ? annHlColor+'aa' : annColor;
      ctx.lineWidth   = annMode==='highlight' ? annSize*6 : annSize;
      ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.globalAlpha = annMode==='highlight' ? 0.5 : 1;
      ctx.beginPath();
      ctx.moveTo(annLast.current.x, annLast.current.y);
      ctx.lineTo(x,y); ctx.stroke();
      annLast.current={x,y};
    };
    const onUp = () => { annDrawing.current=false; annLast.current=null; };
    canvas.addEventListener('mousedown',onDown);
    canvas.addEventListener('mousemove',onMove);
    canvas.addEventListener('mouseup',onUp);
    return ()=>{ canvas.removeEventListener('mousedown',onDown); canvas.removeEventListener('mousemove',onMove); canvas.removeEventListener('mouseup',onUp); };
  },[annMode,annColor,annHlColor,annSize]);

  /* Inline title edit */
  const [editTitle, setEditTitle] = useState(false);
  const [titleDraft, setTitleDraft] = useState(task.title||'');
  const commitTitle = () => { if(titleDraft.trim()) onUpdate({...task,title:titleDraft.trim()}); setEditTitle(false); };

  /* Subtasks */
  const subtasks = task.subtasks||[];
  const [newSubId, setNewSubId] = useState(null);
  const addSub = () => { const id=uid(); onUpdate({...task,subtasks:[...subtasks,{id,title:'',done:false,statusId:'N',priority:'',discipline:'',events:[]}]}); setNewSubId(id); };
  const updateSub = s => onUpdate({...task,subtasks:subtasks.map(x=>x.id===s.id?s:x)});
  const deleteSub = id => onUpdate({...task,subtasks:subtasks.filter(x=>x.id!==id)});

  /* Subtask field visibility */
  const SUB_FIELDS = [
    {id:'status',    label:'סטטוס'},
    {id:'discipline',label:'תחום'},
    {id:'priority',  label:'עדיפות'},
    {id:'dates',     label:'תאריכים'},
    {id:'events',    label:'עדכונים'},
  ];
  const [subFields, setSubFields] = useState(new Set(['status']));
  const [sfOpen, setSfOpen] = useState(false);
  const sfRef = useRef(null);
  useEffect(()=>{
    if(!sfOpen) return;
    const h=e=>{if(sfRef.current&&!sfRef.current.contains(e.target))setSfOpen(false);};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[sfOpen]);

  /* Task events (עדכונים tab) */
  const events = task.events||[];
  const addEvent = () => {
    const newEv={id:uid(),date:todayISO(),status:'progress',assignee:'',notes:''};
    onUpdate({...task,events:[newEv,...events]});
  };
  const updateEvent = ev => onUpdate({...task,events:events.map(e=>e.id===ev.id?ev:e)});
  const deleteEvent = id => onUpdate({...task,events:events.filter(e=>e.id!==id)});

  /* Files */
  const attachments = task.attachments||[];
  const fileRef = useRef(null);
  const addFiles = e => {
    Promise.all([...(e.target.files||[])].map(f=>new Promise(res=>{
      const r=new FileReader(); r.onload=()=>res({id:uid(),name:f.name,size:f.size,type:f.type,data:r.result}); r.readAsDataURL(f);
    }))).then(arr=>onUpdate({...task,attachments:[...attachments,...arr]}));
    e.target.value='';
  };

  const propRow = (label, content) => (
    <div className="tds-prop-row" key={label}>
      <span className="tds-prop-lbl">{label}</span>
      <div className="tds-prop-val">{content}</div>
    </div>
  );

  return ReactDOM.createPortal((
    <>
      <div className="tds-overlay" onClick={onClose}/>
      <div className="tds-panel" dir="rtl" onClick={e=>e.stopPropagation()}>

        {/* ── Header ── */}
        <div className="tds-hdr">
          <StatusCircle size={18} statusId={task.statusId}
            onChange={v=>onUpdate({...task,statusId:v,done:v==='C'})}/>
          {editTitle
            ?<input autoFocus value={titleDraft}
                onChange={e=>setTitleDraft(e.target.value)}
                onBlur={commitTitle}
                onKeyDown={e=>{if(e.key==='Enter')commitTitle();if(e.key==='Escape')setEditTitle(false);}}
                style={{flex:1,fontSize:15,fontWeight:700,border:'none',outline:'1.5px solid var(--accent)',
                  borderRadius:5,padding:'2px 6px',fontFamily:'inherit',background:'var(--bg)',color:'var(--text)'}}/>
            :<span className="tds-title" onClick={()=>{setTitleDraft(task.title||'');setEditTitle(true);}} title="לחץ לעריכה" style={{cursor:'text'}}>
              {task.title||<span style={{color:'var(--text-3)'}}>ללא שם</span>}
            </span>}
          <button onClick={onClose}
            style={{background:'none',border:'none',cursor:'pointer',fontSize:20,color:'var(--text-3)',
              padding:'0 4px',borderRadius:4,lineHeight:1,flexShrink:0}}>×</button>
        </div>

        {/* ── Tabs ── */}
        <div className="tds-tabs">
          <button className={`tds-tab${activeTab==='desc'?' active':''}`} onClick={()=>setActiveTab('desc')}>תיאור משימה</button>
          <button className={`tds-tab${activeTab==='updates'?' active':''}`} onClick={()=>setActiveTab('updates')}>
            עדכונים
            {events.length>0&&<span style={{marginRight:5,fontSize:10,fontWeight:700,color:'var(--accent)',
              background:'rgba(99,102,241,.12)',borderRadius:9,padding:'0 5px'}}>{events.length}</span>}
          </button>
        </div>

        {/* ── Body ── */}
        <div className="tds-body">

          {/* ═══ תיאור משימה tab ═══ */}
          {activeTab==='desc'&&(<>

            {/* Breadcrumb */}
            {(sheetName||group?.name)&&(
              <div style={{display:'flex',alignItems:'center',gap:5,fontSize:12,color:'var(--text-2)',
                marginBottom:14,padding:'6px 10px',background:'var(--bg)',borderRadius:7}}>
                <span style={{fontSize:13}}>📍</span>
                {sheetName&&<span style={{fontWeight:600,color:'var(--text)'}}>{sheetName}</span>}
                {sheetName&&group?.name&&<span style={{color:'var(--text-3)',fontSize:10}}>›</span>}
                {group?.name&&<span style={{color:'var(--text-2)'}}>{group.name}</span>}
              </div>
            )}

            {/* Properties */}
            <div style={{marginBottom:18,borderRadius:8,border:'1px solid var(--border)',overflow:'hidden'}}>
              {propRow('עדיפות', <PriorityCell priority={task.priority} onChange={v=>onUpdate({...task,priority:v})}/>)}
              {propRow('תחום',   <DisciplineCell discipline={task.discipline} onChange={v=>onUpdate({...task,discipline:v})}/>)}
              {propRow('תאריכים',
                <DateRangeCell startDate={task.startDate} dueDate={task.dueDate} isParent={true}
                  onChange={(f,v)=>onUpdate({...task,[f]:v})}/>)}
            </div>

            {/* Description */}
            <div style={{marginBottom:18}}>
              <div className="tds-sec-lbl">תיאור</div>
              <div style={{border:'1px solid var(--border)',borderRadius:8,overflow:'hidden',position:'relative'}}>
                <div className="tds-desc-toolbar">
                  {/* Undo / Redo */}
                  <button className="tds-tb-btn" title="בטל (Ctrl+Z)"
                    onMouseDown={e=>{e.preventDefault();execFmt('undo');}}>↩</button>
                  <button className="tds-tb-btn" title="שחזר (Ctrl+Y)"
                    onMouseDown={e=>{e.preventDefault();execFmt('redo');}}>↪</button>
                  <div style={{width:1,background:'var(--border)',margin:'2px 4px'}}/>
                  {/* Font size */}
                  <select className="tds-tb-btn" title="גודל טקסט"
                    style={{padding:'1px 2px',cursor:'pointer',fontSize:11,minWidth:44}}
                    value=""
                    onChange={e=>{
                      const v=e.target.value; if(!v) return;
                      descRef.current?.focus();
                      document.execCommand('fontSize',false,v);
                      e.target.value='';
                    }}>
                    <option value="" disabled>גד׳</option>
                    <option value="1">קטן</option>
                    <option value="3">רגיל</option>
                    <option value="5">גדול</option>
                    <option value="6">כותרת</option>
                  </select>
                  <div style={{width:1,background:'var(--border)',margin:'2px 4px'}}/>
                  {/* Bold / Italic / Underline */}
                  {[{cmd:'bold',icon:'B',style:{fontWeight:700},title:'הדגשה (Ctrl+B)'},
                    {cmd:'italic',icon:'I',style:{fontStyle:'italic'},title:'נטוי (Ctrl+I)'},
                    {cmd:'underline',icon:'U',style:{textDecoration:'underline'},title:'קו תחתון (Ctrl+U)'},
                  ].map(({cmd,icon,style:s={},title})=>(
                    <button key={cmd} className="tds-tb-btn" title={title} style={s}
                      onMouseDown={e=>{e.preventDefault();execFmt(cmd);}}>{icon}</button>
                  ))}
                  <div style={{width:1,background:'var(--border)',margin:'2px 4px'}}/>
                  {[{cmd:'insertUnorderedList',icon:'• —',title:'רשימת נקודות'},
                    {cmd:'insertOrderedList', icon:'1. —',title:'רשימה ממוספרת'},
                  ].map(({cmd,icon,title})=>(
                    <button key={cmd} className="tds-tb-btn" title={title}
                      onMouseDown={e=>{e.preventDefault();execFmt(cmd);}}>{icon}</button>
                  ))}
                  <div style={{width:1,background:'var(--border)',margin:'2px 4px'}}/>
                  <button className="tds-tb-btn" title="הוסף תמונה"
                    onMouseDown={e=>{e.preventDefault();insertImg();}}>🖼</button>
                </div>
                <div ref={descRef} contentEditable className="tds-editor"
                  data-placeholder="הוסף תיאור..."
                  suppressContentEditableWarning
                  onBlur={saveDesc}
                  onPaste={onPaste}
                  onClick={handleEditorClick}/>
              </div>
            </div>

            {/* Subtasks */}
            <div style={{marginBottom:18}}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
                <span className="tds-sec-lbl" style={{margin:0}}>תת-משימות · {subtasks.length}</span>
                {subtasks.length>0&&<span style={{fontSize:11,fontWeight:400,color:'var(--text-3)'}}>
                  ({subtasks.filter(s=>s.statusId==='C'||s.done).length} הושלמו)
                </span>}
                <div style={{marginRight:'auto',position:'relative'}} ref={sfRef}>
                  <button onClick={()=>setSfOpen(o=>!o)}
                    style={{background:'none',border:'1px solid var(--border)',borderRadius:5,cursor:'pointer',
                      padding:'2px 7px',fontSize:10,color:'var(--text-3)',fontFamily:'inherit',lineHeight:1.6,
                      transition:'border-color .1s,color .1s'}}
                    title="בחר שדות לתצוגה">⚙ שדות</button>
                  {sfOpen&&(
                    <div className="tds-sf-menu">
                      {SUB_FIELDS.map(f=>(
                        <div key={f.id} className="tds-sf-item"
                          onClick={()=>setSubFields(prev=>{const n=new Set(prev);n.has(f.id)?n.delete(f.id):n.add(f.id);return n;})}>
                          <span style={{fontSize:13,color:subFields.has(f.id)?'var(--accent)':'var(--text-3)',width:14,flexShrink:0}}>
                            {subFields.has(f.id)?'✓':'○'}
                          </span>
                          {f.label}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
              {subtasks.map(s=>(
                <SidebarSubRow key={s.id} sub={s} autoFocus={s.id===newSubId}
                  visibleFields={subFields}
                  onUpdate={updateSub} onDelete={()=>deleteSub(s.id)}/>
              ))}
              <button onClick={addSub}
                style={{display:'flex',alignItems:'center',gap:6,background:'none',border:'none',
                  cursor:'pointer',fontSize:12,color:'var(--text-3)',fontFamily:'inherit',padding:'5px 0',width:'100%'}}>
                <span style={{fontSize:15,color:'var(--accent)',lineHeight:1}}>+</span> הוסף תת-משימה
              </button>
            </div>

            {/* Files */}
            <div style={{marginBottom:8}}>
              <div className="tds-sec-lbl" style={{marginBottom:8}}>קבצים · {attachments.length}</div>
              {attachments.map(f=>(
                <div key={f.id} className="tds-file-item">
                  <span style={{fontSize:18,flexShrink:0}}>📎</span>
                  <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'var(--text)'}}>{f.name}</span>
                  <span style={{color:'var(--text-3)',fontSize:11,flexShrink:0}}>{formatBytes(f.size)}</span>
                  <a href={f.data} download={f.name}
                    style={{color:'var(--accent)',fontSize:11,flexShrink:0,textDecoration:'none'}}>הורד</a>
                  <button onClick={()=>onUpdate({...task,attachments:attachments.filter(x=>x.id!==f.id)})}
                    style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-3)',fontSize:14,
                      padding:'0 2px',lineHeight:1,flexShrink:0}}>×</button>
                </div>
              ))}
              <input ref={fileRef} type="file" multiple style={{display:'none'}} onChange={addFiles}/>
              <button className="tds-add-file" onClick={()=>fileRef.current?.click()}>
                <span style={{fontSize:15,lineHeight:1}}>+</span> הוסף קבצים
              </button>
            </div>

          </>)}

          {/* ═══ עדכונים tab ═══ */}
          {activeTab==='updates'&&(<>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
              <span className="tds-sec-lbl" style={{margin:0}}>עדכונים · {events.length}</span>
              <button onClick={addEvent}
                style={{display:'flex',alignItems:'center',gap:5,background:'var(--accent)',color:'#fff',
                  border:'none',borderRadius:6,cursor:'pointer',fontSize:11,fontFamily:'inherit',
                  padding:'5px 12px',fontWeight:600}}>
                <span style={{fontSize:14,lineHeight:1}}>+</span> הוסף עדכון
              </button>
            </div>
            {events.length===0&&(
              <div style={{textAlign:'center',color:'var(--text-3)',fontSize:12,padding:'40px 0'}}>
                אין עדכונים עדיין
              </div>
            )}
            {[...events].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(ev=>(
              <SidebarEventRow key={ev.id} ev={ev} onUpdate={updateEvent} onDelete={()=>deleteEvent(ev.id)}/>
            ))}
          </>)}

        </div>

        {/* ── Image resize handles ── */}
        {imgSel&&ReactDOM.createPortal(
          <div style={{position:'fixed',top:imgSel.rect.top-6,right:window.innerWidth-imgSel.rect.right-6,
            width:imgSel.rect.width+12,height:imgSel.rect.height+12,pointerEvents:'none',zIndex:'calc(var(--z-panel) + 15)'}}>
            {['nw','ne','sw','se','n','s','e','w'].map(c=>(
              <div key={c} className={`tds-img-handle ${c}`} style={{pointerEvents:'all'}}
                onMouseDown={e=>startResize(e,c,imgSel.el.parentElement?.classList.contains('tds-img-wrap')?imgSel.el.parentElement:imgSel.el)}/>
            ))}
          </div>,
          document.body
        )}

        {/* ── Annotation toolbar ── */}
        {imgSel&&ReactDOM.createPortal(
          <div className="tds-ann-bar"
            style={{top:imgSel.rect.top-56, right:window.innerWidth-imgSel.rect.right}}
            onMouseDown={e=>e.preventDefault()}>
            {/* Draw colors */}
            <span className="tds-ann-label">סמן</span>
            {['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#a855f7','#000000'].map(c=>(
              <div key={c} className={`tds-ann-swatch${annMode==='draw'&&annColor===c?' active':''}`}
                style={{background:c}} title={c}
                onClick={()=>{setAnnMode(m=>m==='draw'&&annColor===c?null:'draw');setAnnColor(c);}}/>
            ))}
            <div className="tds-ann-picker" title="צבע מותאם">
              <input type="color" value={annColor} onChange={e=>{setAnnColor(e.target.value);setAnnMode('draw');}}/>
            </div>
            <div className="tds-ann-sep"/>
            {/* Highlight colors */}
            <span className="tds-ann-label">הדגש</span>
            {['#fde68a','#bbf7d0','#bfdbfe','#fecaca','#e9d5ff'].map(c=>(
              <div key={c} className={`tds-ann-swatch${annMode==='highlight'&&annHlColor===c?' active':''}`}
                style={{background:c}} title={c}
                onClick={()=>{setAnnMode(m=>m==='highlight'&&annHlColor===c?null:'highlight');setAnnHlColor(c);}}/>
            ))}
            <div className="tds-ann-sep"/>
            {/* Text box */}
            <button className={`tds-ann-btn${annMode==='text'?' active':''}`}
              onClick={()=>setAnnMode(m=>m==='text'?null:'text')}>T</button>
            {/* Size */}
            <select className="tds-ann-size" value={annSize} onChange={e=>setAnnSize(+e.target.value)}>
              <option value={2}>דק</option>
              <option value={3}>רגיל</option>
              <option value={5}>עבה</option>
              <option value={8}>עבה מאוד</option>
            </select>
            <div className="tds-ann-sep"/>
            {/* Delete */}
            <button className="tds-ann-btn" style={{color:'#ef4444'}} title="הסר תמונה"
              onClick={()=>{
                const wrap=imgSel.el.parentElement;
                if(wrap?.classList.contains('tds-img-wrap')) wrap.remove(); else imgSel.el.remove();
                deselectImg(); saveDesc();
              }}>🗑</button>
            <button className="tds-ann-btn" onClick={deselectImg}>✕</button>
          </div>,
          document.body
        )}

        {/* ── Drawing canvas overlay ── */}
        {imgSel&&(annMode==='draw'||annMode==='highlight')&&ReactDOM.createPortal(
          <canvas ref={annCanvasRef}
            width={Math.round(imgSel.rect.width)} height={Math.round(imgSel.rect.height)}
            style={{position:'fixed',top:imgSel.rect.top,right:window.innerWidth-imgSel.rect.right,
              cursor:annMode==='highlight'?'cell':'crosshair',
              zIndex:'calc(var(--z-panel) + 10)',pointerEvents:'all'}}/>,
          document.body
        )}

        {/* ── Text box insertion ── */}
        {imgSel&&annMode==='text'&&ReactDOM.createPortal(
          <div style={{position:'fixed',top:imgSel.rect.top,right:window.innerWidth-imgSel.rect.right,
            width:imgSel.rect.width,height:imgSel.rect.height,
            zIndex:'calc(var(--z-panel) + 10)',cursor:'crosshair'}}
            onClick={e=>{
              const r=e.currentTarget.getBoundingClientRect();
              const x=e.clientX-r.left, y=e.clientY-r.top;
              const txt=prompt('טקסט לסימון:'); if(!txt) return;
              const span=document.createElement('span');
              span.textContent=txt;
              span.style.cssText=`position:absolute;left:${x}px;top:${y}px;background:${annColor}22;
                color:${annColor};border:1.5px solid ${annColor};border-radius:4px;padding:2px 6px;
                font-size:${10+annSize*2}px;font-weight:600;white-space:nowrap;pointer-events:none;`;
              const wrap=imgSel.el.parentElement;
              if(wrap?.classList.contains('tds-img-wrap')){
                wrap.style.position='relative'; wrap.appendChild(span);
              }
              saveDesc(); setAnnMode(null);
            }}/>,
          document.body
        )}

      </div>
    </>
  ), document.body);
}

/* ══════════════════════════════════════
   Edit Field Modal
══════════════════════════════════════ */
function EditFieldModal({field, isBuiltin, onSave, onDelete, onClose}) {
  const {priorities, disciplines} = useContext(ListsCtx);
  const [title,          setTitle]          = useState(field.title || field.label || '');
  const [type,           setType]           = useState(field.type  || 'single-select');
  const [delayThreshold, setDelayThreshold] = useState(field.delayThreshold ?? '');
  const [options,        setOptions]        = useState(() => {
    if(field.options) return field.options;
    // Seed built-in options from effective lists
    if(field.id==='__priority')   return priorities.map(p=>({id:p.id,label:p.label,color:p.color}));
    if(field.id==='__discipline') return disciplines.map(d=>({id:d.id,label:d.label,color:d.color}));
    if(field.id==='__status')     return STATUSES.map(s=>({id:s.id,label:s.label,color:s.color}));
    return [];
  });
  const [showTypeMenu,  setShowTypeMenu]  = useState(false);
  const [colorPickFor,  setColorPickFor]  = useState(null);
  const typeMenuRef = useRef(null);

  useEffect(()=>{
    if(!showTypeMenu && colorPickFor===null) return;
    const h = e => {
      if(typeMenuRef.current && !typeMenuRef.current.contains(e.target)) setShowTypeMenu(false);
      if(colorPickFor!==null && !e.target.closest('.color-picker-pop') && !e.target.closest('.opt-color-btn')) setColorPickFor(null);
    };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, [showTypeMenu, colorPickFor]);

  const needsOptions = ['single-select','multi-select'].includes(type) ||
    ['__status','__priority','__discipline'].includes(field.id);

  const addOption = () => setOptions(prev => [
    ...prev,
    {id:uid(), label:'', color: OPTION_COLORS[prev.length % OPTION_COLORS.length]}
  ]);

  const updateOpt = (id, key, val) =>
    setOptions(prev => prev.map(o => o.id===id ? {...o,[key]:val} : o));

  const deleteOpt = id => setOptions(prev => prev.filter(o => o.id!==id));

  const moveOpt = (id, dir) => setOptions(prev => {
    const idx = prev.findIndex(o => o.id===id);
    const next = idx + dir;
    if(next < 0 || next >= prev.length) return prev;
    const arr = [...prev];
    [arr[idx], arr[next]] = [arr[next], arr[idx]];
    return arr;
  });

  const handleSave = () => {
    if(!title.trim()) return;
    const thresh = delayThreshold==='' ? null : parseInt(delayThreshold,10);
    onSave({
      ...field,
      title: title.trim(),
      type,
      options: needsOptions ? options.filter(o=>o.label.trim()) : [],
      ...(field.id==='__owner_status' ? {delayThreshold: isNaN(thresh) ? null : thresh} : {}),
    });
  };

  const selectedFT = FIELD_TYPES.find(f=>f.id===type);

  return(
    <div className="af-overlay" onClick={onClose}>
      <div className="ef-box" onClick={e=>e.stopPropagation()}>

        {/* Header */}
        <div className="ef-hdr">
          <div>
            <div className="ef-title">{isBuiltin ? `ערוך שדה: ${field.label}` : 'ערוך שדה'}</div>
          </div>
          <button className="af-close" onClick={onClose}>×</button>
        </div>

        <div className="ef-body">
          {/* Title + Type */}
          <div className="ef-row">
            <div style={{flex:1}}>
              <div className="af-label">שם השדה *</div>
              <input className="af-input" value={title}
                onChange={e=>setTitle(e.target.value)}
                disabled={isBuiltin}
                style={{background:isBuiltin?'var(--bg)':undefined, color:isBuiltin?'var(--text-2)':undefined}}
                onKeyDown={e=>{if(e.key==='Enter')handleSave();}}
              />
            </div>
            <div style={{width:168}}>
              <div className="af-label">סוג שדה</div>

                  <span className="af-type-icon">{selectedFT?.icon||'○'}</span>
                  <span className="af-type-label">{FIELD_TYPE_LABEL[type]||type}</span>

                </button>
                {showTypeMenu&&(
                  <div className="af-type-menu">
                    {FIELD_TYPES.map(ft=>(
                      <div key={ft.id} className={`af-type-opt${ft.id===type?' sel':''}`}
                        onClick={()=>{setType(ft.id);setShowTypeMenu(false);}}>
                        <span className="af-type-icon">{ft.icon}</span>
                        {ft.label}
                        {ft.id===type&&<span style={{marginRight:'auto',color:'var(--blue)'}}>✓</span>}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* Delay threshold — only for __owner_status (סטטוס אחראי) field */}
          {field.id==='__owner_status'&&(
            <div>
              <div className="af-label">סף עיכוב (ימים)</div>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <input
                  type="number" min="1" max="365"
                  className="af-input"
                  style={{width:90,textAlign:'center'}}
                  placeholder="—"
                  value={delayThreshold}
                  onChange={e=>setDelayThreshold(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter')handleSave();}}
                />
                <span style={{fontSize:12,color:'var(--text-2)'}}>
                  {delayThreshold ? `אם עברו יותר מ-${delayThreshold} ימים — יסומן באדום` : 'השאר ריק להשבתת סימון עיכוב'}
                </span>
              </div>
              {delayThreshold&&(
                <div style={{marginTop:6,display:'flex',alignItems:'center',gap:7,fontSize:12,color:'var(--text-2)'}}>
                  <span>תצוגה מקדימה:</span>
                  <span style={{
                    display:'inline-flex',alignItems:'center',gap:4,
                    padding:'3px 9px',borderRadius:20,
                    background:'rgba(239,68,68,.1)', border:'2px solid #EF4444',
                    color:'#991B1B', fontSize:12, fontWeight:700,
                  }}>
                    {delayThreshold}+ <span style={{fontWeight:400,fontSize:11,opacity:.8}}>י׳</span>
                  </span>
                </div>
              )}
            </div>
          )}

          {/* Options editor */}
          {needsOptions&&(
            <div>
              <div className="af-label" style={{marginBottom:8}}>אפשרויות *</div>
              <div style={{display:'flex',flexDirection:'column'}}>
                {options.map((opt,idx)=>(
                  <div key={opt.id} className="opt-row">
                    {/* Up / Down arrows */}
                    <div className="opt-move">
                      <button className="opt-move-btn" disabled={idx===0}
                        onClick={()=>moveOpt(opt.id,-1)} title="הזז למעלה">▲</button>
                      <button className="opt-move-btn" disabled={idx===options.length-1}
                        onClick={()=>moveOpt(opt.id,1)} title="הזז למטה">▼</button>
                    </div>
                    {/* Color swatch + picker */}
                    <div style={{position:'relative',flexShrink:0}}>
                      <button className="opt-color-btn"
                        style={{background:opt.color||'#ccc',borderRadius:5}}
                        onClick={()=>setColorPickFor(colorPickFor===opt.id?null:opt.id)}
                      />
                      {colorPickFor===opt.id&&(
                        <div className="color-picker-pop">
                          {OPTION_COLORS.map(c=>(
                            <button key={c} className={`color-swatch${c===opt.color?' selected':''}`}
                              style={{background:c}}
                              onClick={()=>{updateOpt(opt.id,'color',c);setColorPickFor(null);}}
                            />
                          ))}
                        </div>
                      )}
                    </div>
                    {/* Label */}
                    <input className="opt-input" value={opt.label}
                      placeholder="שם האפשרות..."
                      onChange={e=>updateOpt(opt.id,'label',e.target.value)}
                    />
                    {/* Delete */}
                    <button className="opt-del" onClick={()=>deleteOpt(opt.id)}>×</button>
                  </div>
                ))}
                <button className="opt-add-btn" onClick={addOption}>
                  <span style={{fontSize:15,color:'var(--accent)',lineHeight:1}}>+</span> הוסף אפשרות
                </button>
              </div>
            </div>
          )}
        </div>

        {/* Footer */}
        <div className="ef-footer">
          {!isBuiltin&&onDelete&&(
            <button className="ef-delete" onClick={()=>{onDelete(field.id);onClose();}}>מחק שדה</button>
          )}
          <div style={{marginRight:'auto',display:'flex',gap:8}}>
            <button className="af-cancel" onClick={onClose}>ביטול</button>
            <button className="af-save" disabled={!title.trim()} onClick={handleSave}>שמור שינויים</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════

function AddFieldModal({onSave, onClose, fieldToEdit}) {
  const [title,  setTitle]  = useState(fieldToEdit?.title  || '');

  const [showTypeMenu, setShowTypeMenu] = useState(false);
  const menuRef = useRef(null);
  useEffect(()=>{
    if(!showTypeMenu)return;
    const h=e=>{if(menuRef.current&&!menuRef.current.contains(e.target))setShowTypeMenu(false);};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[showTypeMenu]);

  const selectedType = FIELD_TYPES.find(f=>f.id===type) || FIELD_TYPES[0];

  const handleSave = () => {

      <div className="af-box" onClick={e=>e.stopPropagation()}>

          </div>

        <div className="af-body">
          <div>
            <div className="af-label">שם השדה *</div>
            <input className="af-input" autoFocus placeholder="עדיפות, שלב, סטטוס..."
              value={title} onChange={e=>setTitle(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter')handleSave();if(e.key==='Escape')onClose();}}/>
          </div>
          <div>
            <div className="af-label">סוג שדה</div>
            <div className="af-type-wrap" ref={menuRef}>
              <button className="af-type-btn" onClick={()=>setShowTypeMenu(o=>!o)}>

          </button>
          <button className="af-cancel" onClick={onClose}>ביטול</button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   Edit List Modal  (Priority / Discipline)
══════════════════════════════════════ */
function EditListModal({title, items, onSave, onClose, previewType='pill'}) {
  const [list, setList] = useState(items.map(i=>({...i})));
  const [colorOpen, setColorOpen] = useState(null);
  const [pickerPos, setPickerPos] = useState(null);

  useEffect(()=>{
    if(colorOpen===null) return;
    const h=e=>{
      if(!e.target.closest('.color-picker-pop')&&!e.target.closest('.elm-color-btn'))
        { setColorOpen(null); setPickerPos(null); }
    };
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[colorOpen]);

  const openColor=(i,e)=>{
    if(colorOpen===i){setColorOpen(null);setPickerPos(null);return;}
    const r=e.currentTarget.getBoundingClientRect();
    setPickerPos({top:r.bottom+6,left:r.left});
    setColorOpen(i);
  };

  const move = (i, dir) => {
    const a=[...list], j=i+dir;
    if(j<0||j>=a.length) return;
    [a[i],a[j]]=[a[j],a[i]]; setList(a);
  };
  const upd = (i, patch) => setList(list.map((x,k)=>k===i?{...x,...patch}:x));
  const setColor = (i, color) => { upd(i,{color, bg:hexBg(color)}); setColorOpen(null); setPickerPos(null); };
  const del = i => setList(list.filter((_,k)=>k!==i));
  const add = () => {
    const c=OPTION_COLORS[list.length % OPTION_COLORS.length];
    setList([...list,{id:uid(), label:'', color:c, bg:hexBg(c)}]);
  };

  return (
    <>
    <div className="af-overlay" onClick={onClose}>
      <div className="ef-box" style={{width:460}} onClick={e=>e.stopPropagation()}>
        <div className="ef-hdr">
          <span className="ef-title">{title}</span>
          <button className="af-close" onClick={onClose}>✕</button>
        </div>
        <div className="ef-body" style={{gap:4}}>
          <p style={{fontSize:11,color:'var(--text-3)',marginBottom:6,lineHeight:1.5}}>
            ניתן לשנות צבע, שם וסדר הערכים.<br/>
            מזהה (ID) אינו ניתן לשינוי — הוא מקשר לנתוני המשימות.
          </p>
          {list.map((item, i)=>(
            <div key={item.id||i} className="opt-row" style={{alignItems:'center',gap:8,padding:'6px 8px'}}>
              {/* Color picker */}
              <div style={{flexShrink:0}}>
                <button className="elm-color-btn"
                  style={{width:24,height:24,borderRadius:6,border:'2px solid rgba(0,0,0,.1)',
                          background:item.color,cursor:'pointer',display:'block',padding:0}}
                  onClick={e=>openColor(i,e)}/>
              </div>
              {/* Label input */}
              <input className="opt-input" value={item.label}
                style={{flex:1,fontSize:13}}
                onChange={e=>upd(i,{label:e.target.value})}
                placeholder="שם הערך..."/>
              {/* Preview */}
              {previewType==='status'
                ? <div style={{width:22,height:22,borderRadius:'50%',background:item.color,flexShrink:0,
                      display:'flex',alignItems:'center',justifyContent:'center',
                      fontSize:9,fontWeight:800,color:'#fff',fontFamily:'Heebo,system-ui,sans-serif'}}>
                    {(item.label||'?')[0]}
                  </div>
                : <span className="pill" style={{color:'#fff',background:item.color,fontSize:11,flexShrink:0}}>
                    {item.label||'?'}
                  </span>
              }
              {/* ID badge */}
              <span style={{fontSize:9,color:'var(--text-3)',background:'var(--bg)',border:'1px solid var(--border)',
                            borderRadius:4,padding:'1px 5px',whiteSpace:'nowrap',fontFamily:'monospace',flexShrink:0}}>
                {item.id}
              </span>
              {/* Reorder */}
              <div className="opt-move" style={{opacity:1}}>
                <button className="opt-move-btn" onClick={()=>move(i,-1)} disabled={i===0}>▲</button>
                <button className="opt-move-btn" onClick={()=>move(i,1)} disabled={i===list.length-1}>▼</button>
              </div>
              {/* Delete */}
              <button className="opt-del" style={{opacity:.6}} onClick={()=>del(i)}>✕</button>
            </div>
          ))}
          <button className="opt-add-btn" onClick={add}>＋ הוסף ערך</button>
        </div>
        <div className="ef-footer">
          <button className="af-save" onClick={()=>onSave(list)}>שמור שינויים</button>
          <button className="af-cancel" onClick={onClose}>ביטול</button>
        </div>
      </div>
    </div>
    {colorOpen!==null&&pickerPos&&ReactDOM.createPortal(
      <div className="color-picker-pop"
        style={{position:'fixed',top:pickerPos.top,left:pickerPos.left,right:'auto',zIndex:9999}}>
        {OPTION_COLORS.map(c=>(
          <button key={c} className={`color-swatch${c===list[colorOpen]?.color?' selected':''}`}
            style={{background:c}} onClick={()=>setColor(colorOpen,c)}/>
        ))}
      </div>,
      document.body
    )}
    </>
  );
}

/* ══════════════════════════════════════

function SettingsPanel({data, save, onClose}) {
  const [view, setView]             = useState('menu');  // 'menu' | 'fields'
  const [showAddField, setShowAddField] = useState(false);
  const [editField, setEditField]   = useState(null);   // {field, isBuiltin}

  const fields     = data.fields    || [];

    save({...data, fields:[...fields,{...f,id:uid()}]});
    setShowAddField(false);
  };

    save({...data, fields:fields.map(x=>x.id===f.id?f:x)});
    setEditField(null);
  };
  const deleteField = id => save({...data, fields:fields.filter(f=>f.id!==id)});

  const BUILTIN_TYPE_LABEL = {status:'סטטוס',priority:'עדיפות',tag:'תגית',timeline:'טיימליין',text:'טקסט',days:'ימים',gantt:'גנט'};

  return(
    <>
      {/* Backdrop — click outside closes */}
      <div style={{position:'fixed',inset:0,zIndex:899}} onClick={onClose}/>

      <div className="sp-panel">
        {/* Header */}
        <div className="sp-hdr">
          {view==='fields'&&(
            <button className="sp-hdr-btn" onClick={()=>setView('menu')} title="חזרה">←</button>

          <span className="sp-hdr-title">{view==='fields'?'שדות':'התאמה אישית'}</span>
          <button className="sp-hdr-btn" onClick={onClose} title="סגור">→|</button>
        </div>

        {view==='menu'&&(
          <>
            {/* Project section */}
            <div className="sp-proj">
              <div className="sp-proj-row">
                <span className="sp-proj-name">הפרויקט</span>
                <button className="sp-btn-sm">+ הוסף ▾</button>
              </div>
              <div className="sp-proj-sub">צפה וערוך תכונות של הפרויקט</div>
            </div>

            {/* Nav items */}
            <div className="sp-sec-lbl">תכונות תהליך עבודה</div>
            <div className="sp-nav">
              <button className="sp-nav-item" onClick={()=>setView('fields')}>
                <div className="sp-nav-icon">⊙</div>
                שדות
                <span className="sp-nav-badge">{BUILTIN_FIELDS.length + fields.length}</span>
                <span style={{marginRight:'auto',color:'var(--text-3)',fontSize:11}}>›</span>
              </button>
              <button className="sp-nav-item" style={{opacity:.45,cursor:'default'}} disabled>
                <div className="sp-nav-icon">⊡</div>
                טפסים
                <span style={{marginRight:'auto',color:'var(--text-3)',fontSize:11}}>›</span>
              </button>
              <button className="sp-nav-item" style={{opacity:.45,cursor:'default'}} disabled>
                <div className="sp-nav-icon">⚡</div>
                כללים
                <span style={{marginRight:'auto',color:'var(--text-3)',fontSize:11}}>›</span>
              </button>
            </div>
          </>
        )}

        {view==='fields'&&(
          <div className="sp-content">
            {/* Built-in fields */}
            <div className="sp-sec-lbl">שדות מובנים</div>
            {BUILTIN_FIELDS.map(f=>(
              <div key={f.id} className="sp-field-row" style={{cursor:'pointer'}}
                onClick={()=>setEditField({field:{...f,...(data.builtinConfig?.[f.id]||{})}, isBuiltin:true})}>
                <div className="sp-ficon">{f.icon}</div>
                <span className="sp-fname">{f.label}</span>
                <span className="sp-ftype">{BUILTIN_TYPE_LABEL[f.type]||f.type}</span>
                <div className="sp-faction" onClick={e=>e.stopPropagation()}>
                  {!f.locked&&(
                    <button className={`sp-toggle${!hiddenCols[f.id]?' on':''}`}
                      title={hiddenCols[f.id]?'הצג':'הסתר'}
                      onClick={()=>toggleCol(f.id)}/>
                  )}
                  {f.locked&&<div style={{width:28}}/>}
                </div>
              </div>
            ))}

            {/* Custom fields */}
            {fields.length>0&&(
              <>
                <div className="sp-sep"/>
                <div className="sp-sec-lbl">שדות מותאמים אישית</div>
                {fields.map(f=>(
                  <div key={f.id} className="sp-field-row" style={{cursor:'pointer'}}
                    onClick={()=>setEditField({field:f, isBuiltin:false})}>
                    <div className="sp-ficon">
                      {FIELD_TYPES.find(t=>t.id===f.type)?.icon||'○'}
                    </div>
                    <span className="sp-fname">{f.title}</span>
                    <span className="sp-ftype">{FIELD_TYPE_LABEL[f.type]||f.type}</span>
                    <div className="sp-faction" onClick={e=>e.stopPropagation()}>
                      <button className={`sp-toggle${!hiddenCols[f.id]?' on':''}`}

              <span style={{fontSize:15,lineHeight:1}}>+</span> הוסף שדה

      {/* Add field modal */}
      {showAddField&&(
        <AddFieldModal

      )}

      {/* Edit field modal */}
      {editField&&(
        <EditFieldModal
          field={editField.field}
          isBuiltin={editField.isBuiltin}
          onSave={editField.isBuiltin
            ? (updated=>{ save({...data, builtinConfig:{...(data.builtinConfig||{}),[updated.id]:updated}}); setEditField(null); })
            : updateField}
          onDelete={!editField.isBuiltin ? deleteField : null}
          onClose={()=>setEditField(null)}
        />
      )}
    </>
  );
}

/* ══════════════════════════════════════
   Toolbar with Filter / Sort
══════════════════════════════════════ */
function Toolbar({onAddTask, onAddGroup, filterState, setFilterState, sortState, setSortState, groupByState, setGroupByState, onSettings, settingsOpen, views, activeViewId, activeViewName, isViewDirty, onSaveView, onLoadView, onDeleteView, onRenameView, onUpdateView, trackOptions, stageOptions, isCombinedView}) {
  const groupFields = [...GROUP_FIELDS, ...((trackOptions?.length||stageOptions?.length)?[{field:'__track',label:'מסלול'},{field:'__stage',label:'שלב'}]:[])];
  const {priorities, disciplines} = useContext(ListsCtx);
  const [showFilter,setShowFilter]=useState(false);
  const [showSort,setShowSort]=useState(false);
  const [showGroup,setShowGroup]=useState(false);
  const [showViews,setShowViews]=useState(false);
  const [savingName,setSavingName]=useState(false);
  const [viewNameDraft,setViewNameDraft]=useState('');
  const [renamingId,setRenamingId]=useState(null);
  const [renameDraft,setRenameDraft]=useState('');
  const [filterStep,setFilterStep]=useState(null); // null | 'priority'|'discipline'|'status'
  const [sortCol,setSortCol]=useState(null);
  const [groupAddStep,setGroupAddStep]=useState(false);
  const [groupDragSrc,setGroupDragSrc]=useState(null);
  const [groupDragOver,setGroupDragOver]=useState(null);
  const [showAddMenu,setShowAddMenu]=useState(false);
  const filterRef=useRef(null);
  const sortRef=useRef(null);
  const groupRef=useRef(null);
  const viewsRef=useRef(null);
  const addMenuRef=useRef(null);

  useEffect(()=>{
    if(!showAddMenu)return;
    const h=e=>{if(addMenuRef.current&&!addMenuRef.current.contains(e.target)){setShowAddMenu(false);}};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[showAddMenu]);

  useEffect(()=>{
    if(!showFilter)return;
    const h=e=>{if(filterRef.current&&!filterRef.current.contains(e.target)){setShowFilter(false);setFilterStep(null);}};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[showFilter]);
  useEffect(()=>{
    if(!showSort)return;
    const h=e=>{if(sortRef.current&&!sortRef.current.contains(e.target)){setShowSort(false);setSortCol(null);}};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[showSort]);
  useEffect(()=>{
    if(!showGroup)return;
    const h=e=>{if(groupRef.current&&!groupRef.current.contains(e.target)){setShowGroup(false);setGroupAddStep(false);}};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[showGroup]);
  useEffect(()=>{
    if(!showViews)return;
    const h=e=>{if(viewsRef.current&&!viewsRef.current.contains(e.target)){setShowViews(false);setSavingName(false);setViewNameDraft('');setRenamingId(null);}};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[showViews]);

  const toggleFilter=(col,val)=>{
    setFilterState(prev=>{
      const cur=prev||{};
      const arr=cur[col]||[];
      const next=arr.includes(val)?arr.filter(v=>v!==val):[...arr,val];
      const out={...cur,[col]:next};
      if(!next.length) delete out[col];
      return out;
    });
  };

  const sortList    = sortState||[];
  const filterMap    = filterState||{};
  const filterCount = Object.values(filterMap).reduce((n,arr)=>n+(arr?.length||0),0);
  const sortCount   = sortList.length;
  const groupList   = groupByState||[{field:'section'}];
  const isDefaultGroup = isCombinedView ? groupList.length===0 : (groupList.length===1 && groupList[0].field==='section');
  const groupCount  = isDefaultGroup ? 0 : groupList.length;

  const addSortField  = col => { setSortState([...sortList,{column:col,dir:'desc'}]); setSortCol(null); };
  const removeSortField = col => { const a=sortList.filter(s=>s.column!==col); setSortState(a.length?a:null); };
  const toggleSortDir = col => setSortState(sortList.map(s=>s.column===col?{...s,dir:s.dir==='asc'?'desc':'asc'}:s));
  const moveSortField = (i,d) => {
    const a=[...sortList]; const j=i+d;
    if(j<0||j>=a.length) return;
    [a[i],a[j]]=[a[j],a[i]]; setSortState(a);
  };

  return(
    <div className="toolbar">
      {/* Add task */}
      <div ref={addMenuRef} style={{position:'relative'}}>
        <div className="btn-add-wrap">
          <button className="btn-add-main" onClick={()=>onAddTask()}>+ הוסף משימה</button>
          <button className="btn-add-arr" onClick={()=>setShowAddMenu(o=>!o)}>▾</button>
        </div>
        {showAddMenu&&(
          <div className="dp" style={{right:0,left:'auto',minWidth:170,top:'calc(100% + 6px)'}}>
            <div className="dp-title">מבנה</div>
            <div className="dp-opt" onClick={()=>{onAddGroup();setShowAddMenu(false);}}>
              <span style={{width:14,height:3,background:'var(--text-3)',borderRadius:1,display:'inline-block',flexShrink:0,marginBottom:1}}/>
              מקטע
            </div>
          </div>
        )}
      </div>

      <div className="tb-right">
        {/* Views */}
        <div ref={viewsRef} style={{position:'relative'}}>
          <button className={`btn-tb${activeViewId?' on':''}`}
            onClick={()=>{
              setShowViews(o=>!o);setShowFilter(false);setShowSort(false);setShowGroup(false);
            }}
            style={activeViewId&&isViewDirty?{borderColor:'var(--accent)',color:'var(--accent)',background:'rgba(37,99,235,.07)'}:undefined}>
            {activeViewId&&isViewDirty && (
              <span title="עדכן מבט" onClick={e=>{e.stopPropagation();onUpdateView();}} style={{cursor:'pointer'}}>↻</span>
            )}
            {!(activeViewId&&isViewDirty) && '☰'} {activeViewId ? activeViewName : 'מבטים'}
            {!activeViewId && views?.length>0 && <span className="tb-badge">{views.length}</span>}
          </button>
          {showViews&&(
            <div className="dp" style={{right:0,left:'auto',minWidth:230,padding:0}} onClick={e=>e.stopPropagation()}>
              <div className="dp-title" style={{padding:'8px 12px 6px'}}>מבטים שמורים</div>
              {/* Default view */}
              <div className={`dp-opt${!activeViewId?' sel':''}`}
                onClick={()=>{onLoadView(null);setShowViews(false);}}>
                <span style={{width:14,textAlign:'center',color:!activeViewId?'var(--accent)':'var(--text-3)',fontWeight:700,fontSize:12}}>{!activeViewId?'✓':''}</span>
                ברירת מחדל
              </div>
              {/* Saved views */}
              {(views||[]).map(v=>(
                <div key={v.id} style={{display:'flex',alignItems:'center',gap:4,padding:'3px 8px 3px 12px',borderRadius:7,cursor:'pointer'}}
                  onMouseEnter={e=>e.currentTarget.style.background='var(--bg)'}
                  onMouseLeave={e=>e.currentTarget.style.background=''}>
                  {renamingId===v.id
                    ?<input autoFocus value={renameDraft}
                        onChange={e=>setRenameDraft(e.target.value)}
                        onBlur={()=>{if(renameDraft.trim())onRenameView(v.id,renameDraft.trim());setRenamingId(null);}}
                        onKeyDown={e=>{if(e.key==='Enter'){if(renameDraft.trim())onRenameView(v.id,renameDraft.trim());setRenamingId(null);}if(e.key==='Escape')setRenamingId(null);}}
                        onClick={e=>e.stopPropagation()}
                        style={{flex:1,border:'1px solid var(--accent)',borderRadius:5,padding:'2px 6px',fontSize:12,fontFamily:'inherit',outline:'none'}}/>
                    :<div style={{flex:1,display:'flex',alignItems:'center',gap:6}}
                        onClick={()=>{onLoadView(v.id);setShowViews(false);}}>
                        <span style={{width:14,textAlign:'center',color:'var(--accent)',fontWeight:700,fontSize:12}}>{activeViewId===v.id?'✓':''}</span>
                        <span style={{fontSize:13,fontWeight:activeViewId===v.id?600:400}}>{v.name}</span>
                      </div>
                  }
                  {renamingId!==v.id&&(
                    <div style={{display:'flex',gap:2,flexShrink:0}}>
                      <button title="שנה שם" onClick={e=>{e.stopPropagation();setRenameDraft(v.name);setRenamingId(v.id);}}
                        style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-3)',fontSize:11,padding:'2px 4px',borderRadius:4}}
                        onMouseEnter={e=>e.currentTarget.style.color='var(--text)'}
                        onMouseLeave={e=>e.currentTarget.style.color='var(--text-3)'}>✏</button>
                      <button title="מחק" onClick={e=>{e.stopPropagation();onDeleteView(v.id);}}
                        style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-3)',fontSize:12,padding:'2px 4px',borderRadius:4}}
                        onMouseEnter={e=>e.currentTarget.style.color='#EF4444'}
                        onMouseLeave={e=>e.currentTarget.style.color='var(--text-3)'}>×</button>
                    </div>
                  )}
                </div>
              ))}
              <div className="dp-sep"/>
              {/* Save current view */}
              {!savingName
                ?<div className="dp-opt" onClick={()=>{setSavingName(true);setViewNameDraft('');}}>
                    <span style={{color:'var(--blue)',fontWeight:700,fontSize:14,lineHeight:1}}>+</span> שמור מבט נוכחי
                  </div>
                :<div style={{padding:'6px 12px 10px',display:'flex',gap:6,alignItems:'center'}}>
                    <input autoFocus value={viewNameDraft}
                      onChange={e=>setViewNameDraft(e.target.value)}
                      onKeyDown={e=>{
                        if(e.key==='Enter'&&viewNameDraft.trim()){onSaveView(viewNameDraft.trim());setSavingName(false);setViewNameDraft('');setShowViews(false);}
                        if(e.key==='Escape'){setSavingName(false);setViewNameDraft('');}
                      }}
                      placeholder="שם המבט..."
                      style={{flex:1,border:'1px solid var(--accent)',borderRadius:5,padding:'4px 8px',fontSize:12,fontFamily:'inherit',outline:'none'}}/>
                    <button
                      onClick={()=>{if(viewNameDraft.trim()){onSaveView(viewNameDraft.trim());setSavingName(false);setViewNameDraft('');setShowViews(false);}}}
                      style={{background:'var(--accent)',color:'#fff',border:'none',borderRadius:5,padding:'4px 10px',fontSize:12,cursor:'pointer',fontFamily:'inherit',fontWeight:600,whiteSpace:'nowrap'}}>
                      שמור
                    </button>
                  </div>
              }
            </div>
          )}
        </div>

        {/* Filter */}
        <div ref={filterRef} style={{position:'relative'}}>
          <button className={`btn-tb${filterCount>0?' on':''}`} onClick={()=>{setShowFilter(o=>!o);setShowSort(false);setShowGroup(false);setShowViews(false);}}>
            ⊼ סינון {filterCount>0&&<span className="tb-badge">{filterCount}</span>}
          </button>
          {showFilter&&(
            <div className="dp" style={{right:0,left:'auto',minWidth:220}} onClick={e=>e.stopPropagation()}>
              {!filterStep&&(
                <>
                  <div className="dp-title">סנן לפי</div>
                  {[['priority','עדיפות'],['discipline','תחום'],['status','סטטוס'],
                    ...(trackOptions?.length?[['track','מסלול']]:[]),
                    ...(stageOptions?.length?[['stage','שלב']]:[])].map(([col,lbl])=>{
                    const n=(filterMap[col]||[]).length;
                    return (
                      <div key={col} className="dp-opt" onClick={()=>setFilterStep(col)}>
                        {lbl}
                        <span style={{marginRight:'auto',display:'flex',alignItems:'center',gap:6}}>
                          {n>0&&<span className="tb-badge">{n}</span>}
                          <span style={{color:'var(--text-3)',fontSize:11}}>›</span>
                        </span>
                      </div>
                    );
                  })}
                </>
              )}
              {filterStep==='priority'&&(
                <>
                  <div className="dp-opt" style={{color:'var(--text-3)',fontSize:11,cursor:'pointer'}} onClick={()=>setFilterStep(null)}>‹ חזרה</div>
                  <div className="dp-title">עדיפות</div>
                  {priorities.map(p=>{
                    const sel=(filterMap.priority||[]).includes(p.id);
                    return (
                      <div key={p.id} className="dp-opt" onClick={()=>toggleFilter('priority',p.id)}>
                        <span style={{width:14,fontSize:12,color:'var(--accent)'}}>{sel?'✓':''}</span>
                        <span className="pill" style={{color:p.color,background:p.bg}}>{p.label}</span>
                      </div>
                    );
                  })}
                </>
              )}
              {filterStep==='discipline'&&(
                <>
                  <div className="dp-opt" style={{color:'var(--text-3)',fontSize:11,cursor:'pointer'}} onClick={()=>setFilterStep(null)}>‹ חזרה</div>
                  <div className="dp-title">תחום</div>
                  {disciplines.map(d=>{
                    const sel=(filterMap.discipline||[]).includes(d.id);
                    return (
                      <div key={d.id} className="dp-opt" onClick={()=>toggleFilter('discipline',d.id)}>
                        <span style={{width:14,fontSize:12,color:'var(--accent)'}}>{sel?'✓':''}</span>
                        <span className="pill" style={{color:d.color,background:d.bg}}>{d.label}</span>
                      </div>
                    );
                  })}
                </>
              )}
              {filterStep==='track'&&(
                <>
                  <div className="dp-opt" style={{color:'var(--text-3)',fontSize:11,cursor:'pointer'}} onClick={()=>setFilterStep(null)}>‹ חזרה</div>
                  <div className="dp-title">מסלול</div>
                  {(trackOptions||[]).map(v=>{
                    const sel=(filterMap.track||[]).includes(v);
                    return (
                      <div key={v} className="dp-opt" onClick={()=>toggleFilter('track',v)}>
                        <span style={{width:14,fontSize:12,color:'var(--accent)'}}>{sel?'✓':''}</span>
                        {v}
                      </div>
                    );
                  })}
                </>
              )}
              {filterStep==='stage'&&(
                <>
                  <div className="dp-opt" style={{color:'var(--text-3)',fontSize:11,cursor:'pointer'}} onClick={()=>setFilterStep(null)}>‹ חזרה</div>
                  <div className="dp-title">שלב</div>
                  {(stageOptions||[]).map(v=>{
                    const sel=(filterMap.stage||[]).includes(v);
                    return (
                      <div key={v} className="dp-opt" onClick={()=>toggleFilter('stage',v)}>
                        <span style={{width:14,fontSize:12,color:'var(--accent)'}}>{sel?'✓':''}</span>
                        {v}
                      </div>
                    );
                  })}
                </>
              )}
              {filterStep==='status'&&(
                <>
                  <div className="dp-opt" style={{color:'var(--text-3)',fontSize:11,cursor:'pointer'}} onClick={()=>setFilterStep(null)}>‹ חזרה</div>
                  <div className="dp-title">סטטוס</div>
                  {STATUSES.map(s=>{
                    const sel=(filterMap.status||[]).includes(s.id);
                    return (
                      <div key={s.id} className="dp-opt" onClick={()=>toggleFilter('status',s.id)}>
                        <span style={{width:14,fontSize:12,color:'var(--accent)'}}>{sel?'✓':''}</span>
                        <div className={`sc${s.id==='C'?' sc-done':''}`}
                          style={{color:s.id==='C'?'#fff':s.color,backgroundColor:s.id==='C'?s.color:'transparent',borderColor:s.color,width:14,height:14,fontSize:6,flexShrink:0}}>
                          {s.letter}
                        </div>
                        {s.label}
                      </div>
                    );
                  })}
                </>
              )}
            </div>
          )}
        </div>

        {/* Group */}
        <div ref={groupRef} style={{position:'relative'}}>
          <button className={`btn-tb${groupCount>0?' on':''}`} onClick={()=>{setShowGroup(o=>!o);setShowFilter(false);setShowSort(false);setShowViews(false);}}>
            ⊞ קבוצות {groupCount>0&&<span className="tb-badge">{groupCount}</span>}
          </button>
          {showGroup&&(
            <div className="dp" style={{right:0,left:'auto',minWidth:260,padding:0}} onClick={e=>e.stopPropagation()}>
              {!groupAddStep?(
                <>
                  <div className="dp-title" style={{padding:'8px 12px 6px'}}>קבוצה לפי</div>
                  {groupList.length===0&&(
                    <div style={{padding:'6px 14px 8px',color:'var(--text-3)',fontSize:12}}>אין קבוצה פעילה</div>
                  )}
                  {groupList.map((g,i)=>{
                    const lbl=groupFields.find(f=>f.field===g.field)?.label||g.field;
                    return(
                      <div key={g.field} className={`sort-crit-row${groupDragOver===i?' sort-crit-drop':''}`}
                        draggable
                        onDragStart={e=>{e.dataTransfer.effectAllowed='move';setGroupDragSrc(i);}}
                        onDragOver={e=>{e.preventDefault();if(groupDragSrc!==null&&groupDragSrc!==i)setGroupDragOver(i);}}
                        onDragLeave={()=>setGroupDragOver(null)}
                        onDrop={e=>{
                          e.preventDefault();
                          if(groupDragSrc===null||groupDragSrc===i){setGroupDragSrc(null);setGroupDragOver(null);return;}
                          const a=[...groupList];
                          const [moved]=a.splice(groupDragSrc,1);
                          a.splice(i,0,moved);
                          setGroupByState(a);
                          setGroupDragSrc(null);setGroupDragOver(null);
                        }}
                        onDragEnd={()=>{setGroupDragSrc(null);setGroupDragOver(null);}}>
                        <span className="sort-crit-handle">⠿</span>
                        <span className="sort-crit-num">{i+1}</span>
                        <span className="sort-crit-label">{lbl}</span>
                        <button className="sort-crit-move" disabled={i===0} onClick={()=>{const a=[...groupList];[a[i-1],a[i]]=[a[i],a[i-1]];setGroupByState(a);}}>↑</button>
                        <button className="sort-crit-move" disabled={i===groupList.length-1} onClick={()=>{const a=[...groupList];[a[i],a[i+1]]=[a[i+1],a[i]];setGroupByState(a);}}>↓</button>
                        <button className="sort-crit-del" onClick={()=>{const a=groupList.filter((_,j)=>j!==i);setGroupByState(a.length?a:(isCombinedView?[]:[{field:'section'}]));}}>✕</button>
                      </div>
                    );
                  })}
                  <div style={{padding:'6px 0 4px',borderTop:groupList.length?'1px solid var(--border)':'none'}}>
                    {groupList.length<groupFields.length&&(
                      <div className="dp-opt" onClick={()=>setGroupAddStep(true)}>
                        <span style={{color:'var(--blue)',fontWeight:700,fontSize:14,lineHeight:1}}>+</span> הוסף רמת קבוצה
                      </div>
                    )}
                    {!isDefaultGroup&&(
                      <div className="dp-opt" style={{color:'#EF4444'}} onClick={()=>{setGroupByState(isCombinedView?[]:[{field:'section'}]);setShowGroup(false);}}>
                        ✕ אפס קבוצה
                      </div>
                    )}
                  </div>
                </>
              ):(
                <>
                  <div className="dp-opt" style={{color:'var(--text-3)',fontSize:11,cursor:'pointer',padding:'8px 12px'}} onClick={()=>setGroupAddStep(false)}>‹ חזרה</div>
                  <div className="dp-title" style={{padding:'0 12px 6px'}}>בחר שדה</div>
                  {groupFields.filter(f=>!groupList.find(g=>g.field===f.field)).map(f=>(
                    <div key={f.field} className="dp-opt" onClick={()=>{setGroupByState([...groupList,{field:f.field}]);setGroupAddStep(false);}}>
                      {f.label}
                    </div>
                  ))}
                </>
              )}
            </div>
          )}
        </div>

        {/* Sort */}
        <div ref={sortRef} style={{position:'relative'}}>
          <button className={`btn-tb${sortCount>0?' on':''}`} onClick={()=>{setShowSort(o=>!o);setShowFilter(false);setShowGroup(false);setShowViews(false);}}>
            ⇅ מיון {sortCount>0&&<span className="tb-badge">{sortCount}</span>}
          </button>
          {showSort&&(
            <div className="dp" style={{right:0,left:'auto',minWidth:260,padding:0}} onClick={e=>e.stopPropagation()}>
              {!sortCol?(
                <>
                  <div className="dp-title" style={{padding:'8px 12px 6px'}}>מיין לפי</div>
                  {/* existing criteria */}
                  {sortList.length===0&&(
                    <div style={{padding:'6px 14px 8px',color:'var(--text-3)',fontSize:12}}>אין מיון פעיל</div>
                  )}
                  {sortList.map((s,i)=>{
                    const lbl=SORT_FIELDS.find(f=>f.column===s.column)?.label||s.column;
                    return(
                      <div key={s.column} className="sort-crit-row">
                        <span className="sort-crit-num">{i+1}</span>
                        <span className="sort-crit-label">{lbl}</span>
                        <button className="sort-crit-move" disabled={i===0} onClick={()=>moveSortField(i,-1)}>↑</button>
                        <button className="sort-crit-move" disabled={i===sortList.length-1} onClick={()=>moveSortField(i,1)}>↓</button>
                        <button className="sort-crit-btn" onClick={()=>toggleSortDir(s.column)}>
                          {s.dir==='asc'?'↑ עולה':'↓ יורד'}
                        </button>
                        <button className="sort-crit-del" onClick={()=>removeSortField(s.column)}>✕</button>
                      </div>
                    );
                  })}
                  <div style={{padding:'6px 0 4px',borderTop: sortList.length?'1px solid var(--border)':'none'}}>
                    {sortList.length<SORT_FIELDS.length&&(
                      <div className="dp-opt" onClick={()=>setSortCol('__pick')}>
                        <span style={{color:'var(--blue)',fontWeight:700,fontSize:14,lineHeight:1}}>+</span> הוסף שדה מיון
                      </div>
                    )}
                    {sortList.length>0&&(
                      <div className="dp-opt" style={{color:'#EF4444'}} onClick={()=>{setSortState(null);setShowSort(false);}}>
                        ✕ נקה מיון
                      </div>
                    )}
                  </div>
                </>
              ):(
                <>
                  <div className="dp-opt" style={{color:'var(--text-3)',fontSize:11,cursor:'pointer',padding:'8px 12px'}} onClick={()=>setSortCol(null)}>‹ חזרה</div>
                  <div className="dp-title" style={{padding:'0 12px 6px'}}>בחר שדה</div>
                  {SORT_FIELDS.filter(f=>!sortList.find(s=>s.column===f.column)).map(f=>(
                    <div key={f.column} className="dp-opt" onClick={()=>addSortField(f.column)}>
                      {f.label}
                    </div>
                  ))}
                </>
              )}
            </div>
          )}
        </div>

        {/* Settings */}
        <button className={`btn-tb${settingsOpen?' on':''}`} onClick={onSettings}>⚙ הגדרות</button>
      </div>
    </div>
  );
}
